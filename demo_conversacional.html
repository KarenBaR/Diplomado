<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agente IA CEM — Interbank NBC Empresas</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:linear-gradient(135deg,#f0f4f8 0%,#e2eaf5 100%);margin:0;padding:0;color:#222;}
.container{max-width:640px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
header{background:linear-gradient(135deg,#005F1E 0%,#00BE50 100%);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:12px;}
header h1{margin:0;font-size:1.05rem;font-weight:600;flex:1;}
.status{font-size:.72rem;opacity:.9;padding:4px 12px;background:rgba(255,255,255,.18);border-radius:12px;cursor:pointer;white-space:nowrap;}
.chat-box{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;background:#f7f9fd;}
.message{display:flex;gap:8px;animation:fadeIn .25s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.message.bot{justify-content:flex-start;}
.message.user{justify-content:flex-end;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#005F1E,#00BE50);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px;}
.bubble{max-width:88%;padding:11px 15px;border-radius:18px;font-size:.875rem;line-height:1.5;word-wrap:break-word;}
.message.bot .bubble{background:#fff;color:#1a1a2e;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:0.5px solid #e0e7f0;}
.message.user .bubble{background:linear-gradient(135deg,#005F1E,#00BE50);color:#fff;border-bottom-right-radius:4px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:6px 14px;background:#e6faf0;color:#005F1E;border:1.5px solid #80d9a8;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;}
.chip:hover{background:#00BE50;color:#fff;border-color:#00BE50;}
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px;background:#fff;border-radius:18px;border:0.5px solid #e0e7f0;width:fit-content;}
.typing span{width:7px;height:7px;background:#00BE50;border-radius:50%;animation:bounce .6s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.input-area{padding:14px 16px;border-top:1px solid #e8edf5;display:flex;gap:8px;background:#fff;}
input[type=text]{flex:1;padding:10px 16px;border:1.5px solid #d0daea;border-radius:24px;font-size:.875rem;outline:none;transition:border .2s;background:#f7f9fd;}
input[type=text]:focus{border-color:#00BE50;background:#fff;}
.send-btn{padding:10px 20px;background:linear-gradient(135deg,#005F1E,#00BE50);color:#fff;border:none;border-radius:24px;font-size:.875rem;font-weight:600;cursor:pointer;}
.send-btn:hover{opacity:.9;}

/* Tarjeta cliente */
.card-cliente{background:#fff;border-radius:14px;border:0.5px solid #d0daea;overflow:hidden;margin-top:6px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card-head{background:linear-gradient(135deg,#005F1E,#00BE50);padding:12px 16px;color:#fff;}
.card-head-nombre{font-weight:600;font-size:.95rem;margin-bottom:2px;}
.card-head-giro{font-size:.78rem;opacity:.85;}
.card-body{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;}
.card-field{display:flex;flex-direction:column;gap:1px;}
.card-label{font-size:.7rem;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.03em;}
.card-value{font-size:.85rem;color:#1a1a2e;font-weight:500;}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600;}
.badge-verde{background:#d4f4e2;color:#0a5c2e;}
.badge-rojo{background:#fde8e8;color:#9b1c1c;}
.badge-azul{background:#dbeafe;color:#1e40af;}
.badge-naranja{background:#fef3c7;color:#92400e;}
.badge-p1{background:#005F1E;color:#fff;}
.badge-p2{background:#1F4592;color:#fff;}
.badge-p3{background:#fd7e14;color:#fff;}
.badge-p4{background:#6c757d;color:#fff;}
.card-div{grid-column:1/-1;height:0.5px;background:#e8edf5;}

/* Tabla P&G */
.pyg-wrap{background:#fff;border-radius:14px;border:0.5px solid #d0daea;overflow:hidden;margin-top:6px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.pyg-head{background:linear-gradient(135deg,#005F1E,#00BE50);padding:11px 16px;color:#fff;font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:6px;}
.pyg-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.pyg-table td{padding:8px 14px;border-bottom:0.5px solid #f0f4f8;}
.pyg-table tr:last-child td{border-bottom:none;}
.pyg-table .col-n{width:36px;color:#888;font-size:.75rem;}
.pyg-table .col-v{text-align:right;font-weight:500;min-width:100px;}
.pyg-edit{cursor:pointer;}
.pyg-edit:hover .col-v-inner{background:#e6faf0;border-radius:6px;padding:1px 6px;color:#005F1E;}
.row-result{background:#f0f4f8;}
.row-result td{font-weight:600;}
.row-cem{background:linear-gradient(135deg,#e8f8f0,#d4f4e2);}
.row-cem td{font-weight:700;color:#0a5c2e;font-size:.9rem;}
.row-cem-rojo{background:#fde8e8;}
.row-cem-rojo td{font-weight:700;color:#9b1c1c;font-size:.9rem;}
.pyg-footer{padding:11px 14px;display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:500;}
.pyg-footer.ok{background:#d4f4e2;color:#0a5c2e;}
.pyg-footer.warn{background:#fef3c7;color:#92400e;}
.pyg-footer.error{background:#fde8e8;color:#9b1c1c;}
.pyg-hint{font-size:.7rem;color:#aaa;padding:4px 14px 8px;font-style:italic;}
.inp-inline{width:90px;text-align:right;border:1.5px solid #00BE50;border-radius:6px;padding:2px 6px;font-size:.84rem;background:#e6faf0;outline:none;}

/* Menu botones grandes */
.menu-btns{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.menu-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1.5px solid #d0daea;border-radius:12px;cursor:pointer;transition:all .15s;text-align:left;}
.menu-btn:hover{border-color:#00BE50;background:#e6faf0;}
.menu-btn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.menu-btn-txt{font-weight:600;font-size:.88rem;color:#1a1a2e;}
.menu-btn-sub{font-size:.75rem;color:#888;margin-top:1px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div style="font-size:20px">🏦</div>
    <h1>Agente IA — Banca Negocio</h1>
    <div class="status" id="api-status" onclick="cambiarURL()" title="Clic para cambiar URL">verificando...</div>
  </header>
  <div class="chat-box" id="chat-box"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter')enviarRespuesta()"/>
    <button class="send-btn" onclick="enviarRespuesta()">Enviar</button>
  </div>
</div>

<script>
let API = localStorage.getItem("cem_api_url") || "https://excuse-butter-list-leslie.trycloudflare.com";
let estado = { paso:"menu_principal", modo:"", periodo_activo:null, periodos:[], ruc_actual:null, ruc_data:null };
let datos_calculo = {};
let pyg_vals = {};

const chat = document.getElementById("chat-box");
const input = document.getElementById("user-input");
const statusEl = document.getElementById("api-status");

const FI_TABLA = [[7500,6.6],[10000,5.1],[15000,4.1],[20000,3.1],[25000,2.5],[30000,2.2],[40000,2.0],[50000,1.8],[60000,1.5],[80000,1.5],[100000,1.4],[200000,1.1],[Infinity,1.0]];
const calcFI = v => { for(const [t,fi] of FI_TABLA) if(v<=t) return fi; return 1.0; };
const getFiLabel = v => { const fi=calcFI(v); return fi+"x"; };
const fmtExacto = n => {
  if(!n && n!==0) return "—";
  n = parseFloat(n);
  if(isNaN(n)) return "—";
  return n.toLocaleString("es-PE",{minimumFractionDigits:2, maximumFractionDigits:2});
};

const fmtK = n => {
  if (!n && n!==0) return "—";
  n = parseFloat(n);
  if (isNaN(n)) return "—";
  if (Math.abs(n)>=1e6) return "S/ "+(n/1e6).toFixed(1)+"M";
  if (Math.abs(n)>=1e3) return "S/ "+(n/1e3).toFixed(0)+"K";
  return "S/ "+Math.round(n).toLocaleString("es-PE");
};
const fmt2 = n => n ? parseFloat(n).toLocaleString("es-PE",{minimumFractionDigits:2,maximumFractionDigits:2}) : "0.00";

function botMsg(html, chips=[]) {
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = html;
  if (chips.length) {
    const cd = document.createElement("div");
    cd.className = "chips";
    chips.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "chip";
      btn.textContent = c.label;
      btn.onclick = () => { input.value = c.value; enviarRespuesta(); };
      cd.appendChild(btn);
    });
    bub.appendChild(cd);
  }
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
  return bub;
}

function userMsg(txt) {
  const div = document.createElement("div");
  div.className = "message user";
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.textContent = txt;
  div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing() {
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function checkAPI() {
  try {
    const r = await fetch(API+"/api/v1/health",{signal:AbortSignal.timeout(4000)});
    if(r.ok){ statusEl.textContent="✅ API activa"; return true; }
  } catch(e){}
  statusEl.textContent="❌ Sin conexión";
  return false;
}

function cambiarURL() {
  const n = prompt("URL de la API:", API||"https://...");
  if(n&&n.trim()){ localStorage.setItem("cem_api_url",n.trim().replace(/\/$/,"")); location.reload(); }
}

async function iniciar() {
  if(!API){ botMsg("⚠️ Configura la URL de la API haciendo clic en el botón del header."); return; }
  const ok = await checkAPI();
  if(!ok){ botMsg("⚠️ No puedo conectar con la API. Verifica la URL."); return; }
  try {
    const r = await fetch(API+"/api/v1/config/periodo");
    const d = await r.json();
    estado.periodos = d.periodos_disponibles||[];
    estado.periodo_activo = d.periodo_activo || estado.periodos[0];
    // Pedir periodo UNA SOLA VEZ al inicio
    const chips = estado.periodos.map(p=>({label:p, value:p}));
    botMsg(`¡Hola! 👋 Bienvenido al <b>Agente IA de Banca Negocio</b>.<br>Antes de empezar, ¿con qué campaña vas a trabajar hoy?<br><span style="font-size:.75rem;color:#888">El periodo activo es <b>${estado.periodo_activo}</b> — puedes cambiarlo aquí</span>`,
      chips);
    estado.paso = "seleccionar_periodo_inicial";
  } catch(e){ botMsg("Error al cargar periodos. Intenta de nuevo."); }
}

function mostrarMenu() {
  const periodoLabel = estado.periodo_activo ? `<span style="font-size:.75rem;color:#888;display:block;margin-bottom:4px">Periodo: <b>${estado.periodo_activo}</b></span>` : "";
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `¡Hola! 👋 Soy el <b>Agente IA de Banca Negocio</b>.${periodoLabel}<br>¿Qué deseas hacer?
    <div class="menu-btns">
      <div class="menu-btn" onclick="seleccionarOpcion('cem')">
        <div class="menu-btn-icon" style="background:#e8f0fb">📋</div>
        <div><div class="menu-btn-txt">Calcular CEM</div><div class="menu-btn-sub">Capacidad de endeudamiento mensual</div></div>
      </div>
      <div class="menu-btn" onclick="seleccionarOpcion('perfil')">
        <div class="menu-btn-icon" style="background:#e8f8f0">👤</div>
        <div><div class="menu-btn-txt">Perfil del cliente</div><div class="menu-btn-sub">Ficha completa, riesgo y potencial</div></div>
      </div>
      <div class="menu-btn" onclick="seleccionarOpcion('vinculados')">
        <div class="menu-btn-icon" style="background:#fef9e7">👥</div>
        <div><div class="menu-btn-txt">Ver vinculados</div><div class="menu-btn-sub">RRLL, cónyuge y bancos</div></div>
      </div>
    </div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
  estado.paso = "menu_principal";
}

function seleccionarOpcion(modo) {
  estado.modo = modo;
  if(modo==="vinculados") {
    if(estado.ruc_actual) {
      const t = typing();
      buscarVinculados(estado.ruc_actual, t);
    } else {
      botMsg("Ingresa el <b>RUC</b> del cliente para consultar sus vinculados:");
      estado.paso = "ruc_vinculados";
    }
  } else if(modo==="perfil") {
    if(estado.ruc_actual && estado.ruc_data) {
      userMsg("👤 Perfil completo");
      mostrarPerfilCompleto(estado.ruc_data);
    } else {
      botMsg(`Ingresa el <b>RUC</b> del cliente para ver su perfil:`);
      estado.paso = "solicitar_ruc";
    }
  } else if(modo==="cem") {
    if(estado.ruc_actual && estado.ruc_data) {
      userMsg("📋 Calcular CEM");
      datos_calculo = {};
      pedirSiguienteDato();
    } else {
      botMsg(`Ingresa el <b>RUC</b> del cliente para calcular el CEM:`);
      estado.paso = "solicitar_ruc";
    }
  }
}

async function enviarRespuesta() {
  const txt = input.value.trim();
  if(!txt) return;
  input.value = "";

  if(estado.paso==="menu_principal") return;

  userMsg(txt);
  const t = typing();

  if(estado.paso==="seleccionar_periodo_inicial" || estado.paso==="seleccionar_periodo") {
    t.remove();
    const periodo = estado.periodos.includes(txt) ? txt : estado.periodo_activo;
    try {
      const r = await fetch(API+"/api/v1/config/periodo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({periodo})});
      const d = await r.json();
      estado.periodo_activo = periodo;
      botMsg(`Perfecto, trabajaremos con la campaña <b>${periodo}</b> (${d.registros||""} clientes en base).<br>Ingresa el <b>RUC</b> del cliente que quieres revisar:`);
      estado.paso = "solicitar_ruc";
      estado.modo = "inicio";
    } catch(e){ botMsg("Hubo un problema al cambiar el periodo. ¿Lo intentamos de nuevo?"); }

  } else if(estado.paso==="solicitar_ruc") {
    await buscarRuc(txt.replace(/\D/g,""), t);

  } else if(estado.paso==="ruc_vinculados") {
    await buscarVinculados(txt.replace(/\D/g,""), t);

  } else if(estado.paso==="solicitar_datos" || estado.paso==="confirmar_gf") {
    t.remove();
    if(estado.paso==="confirmar_gf") return; // manejado por botones
    const num = parseFloat(txt.replace(/[^\d.]/g,""));
    if(isNaN(num) || num < 0){ botMsg("Ese valor no lo reconozco como número. Ingresa el monto en soles — si no aplica, pon 0."); pedirSiguienteDato(); return; }
    datos_calculo[estado.dato_esperado] = num;
    pedirSiguienteDato();

  } else if(estado.paso==="menu_post") {
    t.remove();
    if(txt==="__nuevo_ruc__"){ datos_calculo={}; botMsg(`Ingresa el <b>RUC</b> del cliente:<br><span style="font-size:.75rem;color:#888">Periodo: ${estado.periodo_activo}</span>`); estado.paso="solicitar_ruc"; }
    else if(txt==="__menu__"){ datos_calculo={}; mostrarMenu(); }
    else if(txt==="__cem__"){
      estado.modo="cem"; datos_calculo={};
      if(estado.ruc_actual && estado.ruc_data){ userMsg("📋 Calcular CEM"); pedirSiguienteDato(); }
      else { botMsg(`Ingresa el <b>RUC</b> del cliente para calcular el CEM:`); estado.paso="solicitar_ruc"; }
    }
    else if(txt==="__perfil__"){
      estado.modo="perfil"; datos_calculo={};
      if(estado.ruc_actual && estado.ruc_data){ userMsg("👤 Perfil completo"); mostrarPerfilCompleto(estado.ruc_data); }
      else { botMsg(`Ingresa el <b>RUC</b> del cliente para ver su perfil:`); estado.paso="solicitar_ruc"; }
    }
    else if(txt==="__vinculados__"){
      estado.modo="vinculados";
      if(estado.ruc_actual){ const t2=typing(); buscarVinculados(estado.ruc_actual, t2); }
      else { botMsg(`Ingresa el <b>RUC</b> del cliente para consultar sus vinculados:`); estado.paso="ruc_vinculados"; }
    }
    else if(txt==="__cem_mismo__"){ estado.modo="cem"; datos_calculo={}; pedirSiguienteDato(); }
    else if(txt==="__vinc_mismo__"){ const t2=typing(); buscarVinculados(estado.ruc_actual, t2); }
  }
}

async function buscarRuc(ruc, t) {
  if(ruc.length!==11){ t.remove(); botMsg("Ese RUC no parece correcto — debe tener exactamente 11 dígitos. ¿Lo intentamos de nuevo?"); return; }
  try {
    const r = await fetch(API+"/api/v1/cem/buscar-ruc",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ruc})});
    const d = await r.json();
    t.remove();
    if(!r.ok||!d.encontrado){ botMsg("No encontré ese RUC en la base de datos de esta campaña. Verifica que sea correcto o prueba con otro."); return; }
    estado.ruc_actual = ruc;
    estado.ruc_data = d;
    // Cuota SF de referencia = cuota_sf_total de la BD
    // cuota_sf = cuota_total_rrll + cuota_total_empresa
    // cuota_sf_1 = rrll + empresa
    estado.cuota_sf_ref  = d.cuota_sf_bd  || ((d.cuota_total_rrll||0) + (d.cuota_total_empresa||0));
    // cuota_sf_2 = rrll + empresa + conyugue
    estado.cuota_sf2_ref = d.cuota_sf_2_bd || estado.cuota_sf_ref;
    estado.cuota_conyugue = d.cuota_total_conyugue || 0;
    mostrarTarjetaCliente(d, ruc);
  } catch(e){ t.remove(); botMsg("❌ Error: "+e.message); }
}

function mostrarTarjetaCliente(d, ruc) {
  const potGrupo = d.potencial?.grupo_tda || "";
  const potScore = d.potencial?.score_propension ? parseFloat(d.potencial.score_propension).toFixed(2) : "";
  const calif = (d.calificacion_cliente||"").toUpperCase();
  const califClass = calif==="NORMAL"?"badge-verde":"badge-rojo";
  const potClass = potGrupo==="P1"?"badge-p1":potGrupo==="P2"?"badge-p2":potGrupo==="P3"?"badge-p3":"badge-p4";
  const sitClass = d.situacion_cliente==="CON_CREDITO"?"badge-verde":"badge-naranja";

  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `<b>✅ Encontré al cliente</b>
    <div class="card-cliente">
      <div class="card-head">
        <div class="card-head-nombre">${d.nombre||d.razon_social||"—"}</div>
        <div class="card-head-giro">${d.giro_canonico||"—"}</div>
      </div>
      <div class="card-body">
        <div class="card-field"><span class="card-label">RUC</span><span class="card-value">${ruc}</span></div>
        <div class="card-field"><span class="card-label">Sector</span><span class="card-value">${d.subsector||"—"}</span></div>
        <div class="card-field"><span class="card-label">Margen asignado</span><span class="card-value">${d.margen_asignado?(d.margen_asignado*100).toFixed(0)+"%":"—"}</span></div>
        <div class="card-field"><span class="card-label">Deuda máx. 12m</span><span class="card-value">${fmtK(d.deuda_total_sbs)}</span></div>
        ${d.calificacion_sbs?`<div class="card-field"><span class="card-label">Calificación SBS</span><span class="card-value"><span class="badge ${d.calificacion_sbs.toUpperCase().includes("NORMAL")&&!d.calificacion_sbs.toUpperCase().includes("NO NORMAL")?"badge-verde":"badge-gris"}">${d.calificacion_sbs.replace(/^Calificacion SBS /i,"")}</span></span></div>`:""}
        ${d.saldo_col_ibk>0?`<div class="card-field"><span class="card-label">Saldo IBK col.</span><span class="card-value">${fmtK(d.saldo_col_ibk)}</span></div>`:""}
        <div class="card-div"></div>




        ${potGrupo?`<div class="card-field"><span class="card-label">Potencial</span><span class="card-value"><span class="badge ${potClass}">${potGrupo}</span>${potScore?" score "+potScore:""}</span></div>`:""}

        const fi = calcFI(vd);
        const vaj = fmtExacto(vd * fi);
        const vdExacto = fmtExacto(vd);
        estado.venta_sunat_mensual = vd;  // guardar para el botón
        estado.paso = "solicitar_datos";
        estado.dato_esperado = "venta_mensual_rp";

        const div = document.createElement("div");
        div.className = "message bot";
        div.innerHTML = '<div class="avatar">IA</div>';
        const bub = document.createElement("div");
        bub.className = "bubble";

              '<div><span style="color:#888;display:block;font-size:.72rem">Venta ajustada</span><b style="color:#1F4592">S/ '+vaj+'</b></div>' +
            '</div>' +
            '<button class="chip" style="width:100%;justify-content:center;background:#e8f0fb;border-color:#b8ccf0" onclick="usarVentaSunat()">'+

        div.appendChild(bub);
        chat.appendChild(div);
        setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
        return;  // no continuar con el botMsg normal
      }
      // Gasto financiero: confirmar con cuota SF de BD
      else if(s.key==="gastos_familiares_mensual") {
        // Antes de gastos familiares, manejar GF si aún no está confirmado
        if(!("gasto_financiero_mensual" in datos_calculo)) {
          if(estado.cuota_sf_ref > 0) {
            confirmarGastoFinanciero();
          } else {
            // Sin cuota SF en BD — pedir directamente
            estado.dato_esperado = "gasto_financiero_mensual";
            estado.paso = "solicitar_datos";
            botMsg(`Este cliente no tiene gasto financiero estimado en el sistema.<br>¿Cuál es su <b>gasto financiero mensual real</b>? (si no tiene, ingresa 0)<br><span style="font-size:.75rem;color:#aaa">Incluye todas sus cuotas vigentes en el sistema financiero</span>`);
          }
          return;
        }
        botMsg(`${s.label}<br><span style="font-size:.75rem;color:#aaa">${s.hint}</span>`);
      }
      else {
        botMsg(`${s.label}<br><span style="font-size:.75rem;color:#aaa">${s.hint}</span>`);
      }
      return;
    }
  }
  // Confirmar GF si no está definido aún
  if(!("gasto_financiero_mensual" in datos_calculo)) {
    confirmarGastoFinanciero(); return;

  calcularCEM();
}

function recalcGFDom(pid, rrll, empresa, cony) {
  const chkR = document.getElementById("chk_rrll_"+pid)?.checked    ? rrll    : 0;
  const chkE = document.getElementById("chk_empresa_"+pid)?.checked ? empresa : 0;
  const chkC = document.getElementById("chk_cony_"+pid)?.checked    ? cony    : 0;
  const total = chkR + chkE + chkC;
  const el = document.getElementById("total_"+pid);
  if(el) el.textContent = "S/ "+fmtExacto(total);
}

function confirmarGFSeleccionDom(pid, rrll, empresa, cony) {
  const chkR = document.getElementById("chk_rrll_"+pid)?.checked;
  const chkE = document.getElementById("chk_empresa_"+pid)?.checked;
  const chkC = document.getElementById("chk_cony_"+pid)?.checked;
  const total = (chkR?rrll:0) + (chkE?empresa:0) + (chkC?cony:0);
  const partes = [];
  if(chkR) partes.push("rrll");
  if(chkE) partes.push("empresa");
  if(chkC) partes.push("conyugue");

  // Deshabilitar panel
  document.getElementById(pid)?.querySelectorAll("input,button").forEach(el => {
    el.disabled = true; el.style.pointerEvents = "none";
  });

  userMsg("GF: S/ "+fmtExacto(total)+" ("+partes.join(" + ")+")");
  datos_calculo["gasto_financiero_mensual"] = null;
  datos_calculo["cuotas_incluir"] = partes.join(",");
  datos_calculo["_gf_display"]   = total;
  pedirSiguienteDato();
}

async function calcularCEM() {
  const t = typing();
  try {
    const gfVal   = datos_calculo.gasto_financiero_mensual;
    const tieneGF = gfVal !== null && gfVal !== undefined;
    const payload = {
      ruc: estado.ruc_actual,
      oferta_solicitada: datos_calculo.oferta_solicitada,
      plazo_meses: datos_calculo.plazo_meses,
      venta_mensual_rp: datos_calculo.venta_mensual_rp,
      gastos_admin_mensual: datos_calculo.gastos_admin_mensual||0,
      tiene_programa_pagos: tieneGF,
      gasto_financiero_mensual: tieneGF ? gfVal : null,
      gastos_familiares_mensual: datos_calculo.gastos_familiares_mensual||0,
      cuotas_incluir: datos_calculo.cuotas_incluir || "rrll,empresa",
    };
    const r = await fetch(API+"/api/v1/cem/calcular",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const d = await r.json();
    t.remove();
    if(!r.ok){ botMsg("Tuve un error al calcular el CEM: "+(d.detail||"error desconocido")+". ¿Revisamos los datos ingresados?"); return; }
    mostrarPyG(d);
  } catch(e){ t.remove(); botMsg("❌ Error: "+e.message); }
}

function mostrarPyG(d) {
  const det = d.detalle||{};
  const ventasInput = det.paso_01_ventas_rt || datos_calculo.venta_mensual_rp || 0;
  pyg_vals = {
    ventas:   ventasInput,
    fi:       calcFI(ventasInput),
    margen:   (estado.ruc_data?.margen_asignado) || 0.45,
    g_admin:  det.paso_04_gastos_admin    || datos_calculo.gastos_admin_mensual || 0,
    g_fin:    det.paso_06_gastos_financieros || datos_calculo.gasto_financiero_mensual || 0,
    g_fam:    det.paso_08_gastos_familiares || datos_calculo.gastos_familiares_mensual || 0,
    cuota:    d.cuota_estimada_mensual    || 0,
    oferta:   datos_calculo.oferta_solicitada || 0,
    plazo:    datos_calculo.plazo_meses || 0,
  };

  const pygId = "pyg_"+Date.now();
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `<b>📊 Aquí está el Estado de Pérdidas y Ganancias</b><div id="${pygId}"></div><div style="font-size:.75rem;color:#888;margin-top:4px">✏ Doble clic en cualquier fila para ajustar los valores y ver el impacto en el CEM.</div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);

  renderPyG(pygId);

  // Recomendación humanizada post-CEM
  const cemCalc = calcPyG(pyg_vals);
  const rucData = estado.ruc_data || {};
  const grp = rucData.grupo_propension_tda || rucData.potencial?.grupo_tda || "";
  let recomMsg = "";
  if(cemCalc.cem >= pyg_vals.cuota * 1.5) {
    recomMsg = grp==="P1"
      ? `Este es un cliente <b>P1 con margen sólido</b>. El CEM cubre ampliamente la cuota — considera si hay espacio para una oferta mayor.`
      : `El CEM cubre bien la cuota propuesta. El cliente tiene capacidad de pago holgada.`;
  } else if(cemCalc.cem >= pyg_vals.cuota) {
    recomMsg = `El cliente califica, pero el margen es <b>ajustado</b>. Valida bien los gastos financieros antes de enviar a Riesgos.`;
  } else if(cemCalc.cem > 0) {
    recomMsg = `El CEM es positivo pero <b>no cubre la cuota</b>. Puedes explorar bajar el monto o ampliar el plazo para reducir la cuota.`;
  } else {
    recomMsg = `El CEM resultó negativo. <b>Revisa los datos</b> — especialmente los gastos financieros y las ventas declaradas.`;
  }
  if(recomMsg) {
    setTimeout(()=>{ botMsg(`💡 <b>Recomendación:</b> ${recomMsg}`); }, 400);
  }
  setTimeout(()=>{
    mostrarMenuPost();
  }, recomMsg ? 900 : 600);
}

function calcPyG(v) {
  const ventaAjustada = v.ventas * v.fi;
  const ub  = ventaAjustada * v.margen;
  const uo  = ub - v.g_admin;
  const un  = uo - v.g_fin;
  const cem = un - v.g_fam;
  return { ub, uo, un, cem, ventaAjustada };
}

function renderPyG(pid) {
  const v = pyg_vals;
  const c = calcPyG(v);
  const ok = c.cem >= v.cuota;
  const footClass = ok ? "ok" : (c.cem > 0 ? "warn" : "error");
  const cemRowClass = c.cem >= 0 ? "row-cem" : "row-cem-rojo";

    const display = tipo==="fi" ? val.toFixed(1)+"x" : isPct ? (val*100).toFixed(0)+"%" : "S/ "+fmt2(val);

      <span class="col-v-inner">${display} ✏</span></td>`;
  };
  const calcCell = v2 => `<td class="col-v">S/ ${fmt2(v2)}</td>`;

  document.getElementById(pid).innerHTML = `
    <div class="pyg-wrap">

window.editPyG = function(pid, campo, td, isPct, tipo) {
  const cur = tipo==="fi" ? pyg_vals[campo].toFixed(1) : isPct ? (pyg_vals[campo]*100).toFixed(1) : pyg_vals[campo].toFixed(0);
  const inp = document.createElement("input");
  inp.type="number"; inp.value=cur; inp.className="inp-inline";
  inp.step = tipo==="fi" ? "0.1" : isPct?"1":"100";
  td.innerHTML=""; td.appendChild(inp); inp.focus(); inp.select();
  const commit = () => {
    let v = parseFloat(inp.value);
    if(isNaN(v)) return;
    if(tipo==="fi")       pyg_vals[campo] = Math.max(1.0, Math.min(10, v));
    else if(isPct)        pyg_vals[campo] = Math.max(1,Math.min(99,v))/100;
    else                  pyg_vals[campo] = Math.max(0,v);
    renderPyG(pid);
  };
  inp.addEventListener("keydown", e => { if(e.key==="Enter"){e.preventDefault();commit();} if(e.key==="Escape")renderPyG(pid); });
  inp.addEventListener("blur", commit);
};

async function buscarVinculados(ruc, t) {
  if(!ruc || ruc.length!==11){ t.remove(); botMsg("El RUC debe tener 11 dígitos. ¿Lo volvemos a intentar?"); return; }
  try {
    const r = await fetch(API+"/api/v1/cem/vinculados/"+ruc);
    if(!r.ok){ t.remove(); botMsg("Tuve un problema al consultar los vinculados (error "+r.status+"). Intenta de nuevo en un momento."); return; }
    const d = await r.json();
    t.remove();
    // Verificar si tiene datos — algunos endpoints devuelven estructura diferente
    const tieneData = d.encontrado || d.lista_rrll?.length > 0 || d.resumen;
    if(!tieneData){ botMsg("No encontré RRLL ni vinculados registrados para este cliente en el RCC. Puede que no tenga representantes activos en el sistema."); mostrarMenuPost(); return; }
    else {
      const res = d.resumen||{};
      const sem = res.semaforo || "gris";
      const deudaTotal = parseFloat(res.deuda_total_vinculados||0);
      const malasCalif = parseInt(res.rrll_con_mala_calif||0);
      const totalRRLL  = parseInt(res.total_rrll||0);

      // Colores según semáforo incluyendo gris
      const semC  = sem==="verde"?"#0a5c2e":sem==="amarillo"?"#92400e":sem==="rojo"?"#9b1c1c":"#555";
      const semBg = sem==="verde"?"#d4f4e2":sem==="amarillo"?"#fef3c7":sem==="rojo"?"#fde8e8":"#f0f0f0";

      // Texto humanizado del semáforo
      const semTxt = sem==="verde"  ? "Sin alertas — vinculados en regla" :
                     sem==="amarillo"? "Atención — hay vinculados con atrasos" :
                     sem==="rojo"   ? "Riesgo alto — vinculados con mala calificación" :
                                      "Sin historial crediticio relevante";

      // Comentario humanizado al final
      let comentario = "";
      if(deudaTotal === 0 && totalRRLL > 0) {
        comentario = "Los representantes legales no registran deuda en el sistema financiero. Esto puede indicar que operan de manera informal o que su actividad crediticia es mínima — no necesariamente es una señal negativa.";
      } else if(malasCalif === 0 && deudaTotal > 0) {
        comentario = "Los vinculados tienen historial crediticio limpio. Ninguno registra alertas de calificación — señal positiva para avanzar con la evaluación.";
      } else if(malasCalif > 0) {
        comentario = malasCalif + " de los " + totalRRLL + " representante(s) tiene calificación con alerta. Evalúa el impacto antes de enviar a Riesgos.";
      } else if(totalRRLL === 0) {
        comentario = "No se encontraron representantes legales registrados en el RCC para este cliente.";
      }

      const div = document.createElement("div");
      div.className="message bot";
      div.innerHTML='<div class="avatar">IA</div>';
      const bub = document.createElement("div");
      bub.className="bubble";
      bub.innerHTML="<b>👥 Representantes legales y vinculados</b>"+
        '<div class="card-cliente">'+
          '<div class="card-head" style="background:'+semBg+';color:'+semC+'">'+
            '<div class="card-head-nombre">'+semTxt+'</div>'+
            '<div class="card-head-giro">'+totalRRLL+' RRLL · '+malasCalif+' con alerta</div>'+
          '</div>'+
          '<div class="card-body">'+
            '<div class="card-field"><span class="card-label">Deuda total vinculados</span><span class="card-value">'+fmtK(deudaTotal)+'</span></div>'+
            '<div class="card-field"><span class="card-label">Cuota total RRLL</span><span class="card-value">'+fmtK(res.cuota_total_rrll)+'</span></div>'+
          '</div>'+
          '<div style="padding:8px 14px;font-size:.8rem;border-top:0.5px solid #e8edf5">'+
            (d.lista_rrll||[]).map(function(r2) {
              const califColor = (r2.calificacion_label||"").toUpperCase()==="NORMAL" ? "#0a5c2e" : "#9b1c1c";
              return '<div style="padding:6px 0;border-bottom:0.5px solid #f0f4f8">'+
                '<b>'+r2.cargo+'</b> · DNI '+r2.dni+'<br>'+
                '<span style="font-size:.75rem;color:'+califColor+'">'+r2.calificacion_label+'</span>'+
                (parseFloat(r2.deuda_total||0)>0 ? ' · Deuda: '+fmtK(r2.deuda_total) : ' · Sin deuda registrada')+
              '</div>';
            }).join("")+
          '</div>'+
          (comentario ? '<div style="padding:10px 14px;background:#f7f9fd;border-top:0.5px solid #e8edf5;font-size:.78rem;color:#444;line-height:1.5;font-style:italic">'+comentario+'</div>' : '')+
        '</div>';
      div.appendChild(bub); chat.appendChild(div);
      setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
    }
    mostrarMenuPost();
  } catch(e){ t.remove(); botMsg("❌ Error: "+e.message); }
}

          </div>
          ${(()=>{
            const v2 = d.v2_var_deuda_noibk_12m;
            if(v2!==null&&v2!==undefined&&Math.abs(v2)>10&&Math.abs(v2)<500) {
              const creceComp = v2>15;
              const bgColor = creceComp?"#fff8e6":"#f0faf4";
              const borderColor = creceComp?"#FAC775":"#00BE50";
              const ico = creceComp?"💡":"📊";
              const txt = creceComp
                ? "Su deuda con la <b>competencia</b> creció <b>"+v2.toFixed(0)+"%</b> en 12 meses — podría beneficiarse de una <b style='color:#005F1E'>compra de deuda</b> con IBK a mejores condiciones."
                : v2<-15
                ? "Redujo su deuda con la competencia "+Math.abs(v2).toFixed(0)+"% — está saneando su situación financiera."
                : "Variación deuda competencia: "+(v2>0?"▲ ":"▼ ")+Math.abs(v2).toFixed(1)+"% en 12 meses.";
              return "<div style='margin-top:8px;background:"+bgColor+";border-radius:8px;padding:8px 10px;font-size:.78rem;border-left:3px solid "+borderColor+";line-height:1.5'>"+ico+" "+txt+"</div>";
            }
            return "";
          })()}
        </div>`:""}
      </div>
    </div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(function() {
    chat.scrollTop = chat.scrollHeight;
    renderTop5(d, estado.ruc_actual);
  }, 50);
  mostrarMenuPost(false);
}

function interpretarVariables(d) {
  // Devuelve lista de señales humanizadas según las top variables del modelo
  // Solo muestra si el valor es significativo — omite si no hay señal clara
  var señales = [];

  // V1: Máxima deuda SF últimos 12M (13.26%) — indica capacidad de endeudamiento
  var v1 = d.v1_deuda_max_12m;
  if(v1 && v1 > 0) {
    if(v1 >= 200000)
      señales.push({ico:"💼", txt:"En los últimos 12 meses ha manejado una deuda máxima de "+fmtK(v1)+" en el sistema financiero — perfil de alta capacidad de endeudamiento", positivo:true});
    else if(v1 >= 50000)
      señales.push({ico:"💼", txt:"En los últimos 12 meses su deuda máxima fue de "+fmtK(v1)+" — capacidad de endeudamiento moderada, dentro del perfil esperado", positivo:true});
    else if(v1 > 0)
      señales.push({ico:"💼", txt:"En los últimos 12 meses su deuda máxima fue de "+fmtK(v1)+" — perfil conservador en el sistema financiero", positivo:null});
  }

  // V2: Variación deuda No-IBK últimos 12M (8.45%) — competencia (entidades distintas a IBK)
  var v2 = d.v2_var_deuda_noibk_12m;
  if(v2 !== null && v2 !== undefined && Math.abs(v2) > 5 && Math.abs(v2) < 500) {
    if(v2 > 20)
      señales.push({ico:"📈", txt:"Su deuda con otras entidades (competencia) creció "+v2.toFixed(0)+"% en el último año — está buscando financiamiento fuera de IBK, oportunidad para captarlo", positivo:true});
    else if(v2 > 5)
      señales.push({ico:"📊", txt:"Deuda con la competencia creciendo levemente (+"+v2.toFixed(0)+"%) — activo financieramente fuera de IBK", positivo:null});
    else if(v2 < -20)
      señales.push({ico:"📉", txt:"Redujo su deuda con otras entidades en "+Math.abs(v2).toFixed(0)+"% — posible consolidación o menor actividad con la competencia", positivo:null});
  }

  // V3: Promedio saldo vigente préstamos sistema financiero últimos 6M (7.17%)
  var v3 = d.v3_saldo_vig_prestamos;
  if(v3 && v3 > 0) {
    if(v3 >= 100000)
      señales.push({ico:"🏦", txt:"Promedio de saldo vigente en el sistema financiero (últimos 6M): "+fmtK(v3)+" — demuestra capacidad para manejar créditos de alto volumen", positivo:true});
    else if(v3 >= 20000)
      señales.push({ico:"🏦", txt:"Promedio de saldo vigente en el sistema (últimos 6M): "+fmtK(v3)+" — historial crediticio activo", positivo:true});
    else if(v3 > 0)
      señales.push({ico:"🏦", txt:"Saldo promedio vigente en el sistema (últimos 6M): "+fmtK(v3)+"", positivo:null});
  }

  // V4: Nro. colocaciones en bancos últimos 12M (5.99%) — cuántos productos tiene
  var v4 = d.v4_nro_coloc_bancos;
  if(v4 && v4 > 0) {
    if(v4 >= 3)
      señales.push({ico:"📋", txt:"Tiene "+v4.toFixed(1)+" productos financieros activos en promedio — cliente con experiencia bancaria", positivo:true});
    else if(v4 >= 1.5)
      señales.push({ico:"📋", txt:"Opera con "+v4.toFixed(1)+" productos bancarios en promedio", positivo:null});
  }

  // V5: Cantidad de empresas (5.33%) — multibanca
  var v5 = d.v5_cant_empresas;
  if(v5 && v5 > 0) {
    if(v5 >= 3)
      señales.push({ico:"🏢", txt:"Trabaja con "+v5.toFixed(1)+" entidades financieras — perfil multibanca activo, IBK puede ganar más participación", positivo:true});
    else if(v5 >= 2)
      señales.push({ico:"🏢", txt:"Opera con "+v5.toFixed(1)+" entidades — hay espacio para fortalecer la relación con IBK", positivo:null});
    else if(v5 < 1.5)
      señales.push({ico:"🏢", txt:"Opera principalmente con una sola entidad — potencial para diversificar con IBK", positivo:true});
  }

  return señales;
}

function generarRecomendacion(d) {
  var grp = d.grupo_propension_tda || (d.potencial && d.potencial.grupo_tda) || "";
  var score = parseFloat(d.score_propension || (d.potencial && d.potencial.score_propension) || 0);
  var calif = (d.calificacion_cliente || "").toUpperCase();
  var situacion = d.situacion_cliente || "";
  var fueGest = d.flg_gestionado;
  var acepto = d.flg_acepta1;
  var desembolso = d.flg_desembolsado;
  var recencia = d.recencia_pensara_meses || 0;
  var atrasoIBK = d.max_atraso_ibk;
  var v2 = d.v2_var_deuda_noibk_12m;

  var rec = "";

  // Caso 1: cliente con riesgo
  if(calif === "PERDIDA" || (atrasoIBK !== null && atrasoIBK > 30)) {
    return "⚠️ Este cliente presenta señales de riesgo crediticio. Antes de avanzar con una oferta, valida su situación actual con Riesgos.";
  }

  // Caso 2: P1 con experiencia IBK
  if(grp === "P1" && desembolso) {
    rec = "✅ Cliente prioritario que ya tiene experiencia con IBK. Alta probabilidad de cierre — enfócate en la oferta correcta y el momento oportuno.";
  }
  // Caso 3: P1 sin historial IBK
  else if(grp === "P1" && !desembolso) {
    if(v2 && v2 > 10)
      rec = "✅ Cliente P1 con deuda creciente en la competencia — excelente oportunidad para capturarlo. Preséntate con una propuesta competitiva.";
    else
      rec = "✅ Cliente de alta prioridad. Todavía no tiene experiencia con IBK — una buena primera impresión puede marcar la diferencia.";
  }
  // Caso 4: P2 con crecimiento en competencia
  else if(grp === "P2" && v2 && v2 > 15) {
    rec = "👍 Cliente P2 con deuda creciente en la competencia (+"+v2.toFixed(0)+"%). Considera presentar un producto de <b>compra de deuda</b> para consolidar y atraerlo a IBK.";
  }
  // Caso 4b: P2 que aceptó antes
  else if(grp === "P2" && acepto) {
    rec = "👍 Mostró interés en el pasado. Retomar el contacto con una oferta renovada puede ser el empuje que necesita para cerrar.";
  }
  // Caso 5: P2 sin contacto previo largo
  else if(grp === "P2" && recencia > 12) {
    rec = "👍 Lleva "+recencia+" meses sin ser contactado. Es un buen momento para retomar — el contexto del negocio puede haber cambiado.";
  }
  // Caso 6: P2 general
  else if(grp === "P2") {
    rec = "👍 Cliente con buena propensión. Gestiona con prioridad y personaliza la oferta según su actividad financiera reciente.";
  }
  // Caso 7: P3/P4
  else if(grp === "P3" || grp === "P4") {
    rec = "ℹ️ Propensión "+grp+". Puede ser una oportunidad de largo plazo — gestiona si tienes capacidad, pero prioriza tus P1 y P2 primero.";
  }
  // Sin grupo
  else {
    rec = "ℹ️ Revisa el historial del cliente antes de avanzar con la oferta.";
  }

  return rec;
}

function renderTop5(d, ruc) {
  const container = document.getElementById("top5vars_"+ruc);
  if(!container) return;

  const señales = interpretarVariables(d);
  const recomendacion = generarRecomendacion(d);

  // Señales de variables
  if(señales.length > 0) {
    señales.forEach(function(s) {
      const row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f4f8;font-size:.79rem";
      const colTxt = s.positivo === true ? "#0a5c2e" : s.positivo === false ? "#9b1c1c" : "#444";
      row.innerHTML =
        '<span style="font-size:15px;flex-shrink:0;margin-top:1px">'+s.ico+'</span>'+
        '<span style="color:'+colTxt+';line-height:1.4">'+s.txt+'</span>';
      container.appendChild(row);
    });
  } else {
    const empty = document.createElement("div");
    empty.style.cssText = "font-size:.78rem;color:#888;font-style:italic;padding:4px 0";
    empty.textContent = "No hay señales destacadas en las variables del modelo para este cliente.";
    container.appendChild(empty);
  }

  // Recomendación final
  if(recomendacion) {
    const recDiv = document.createElement("div");
    recDiv.style.cssText = "margin-top:10px;padding:10px 12px;background:#e6faf0;border-radius:8px;border-left:3px solid #00BE50;font-size:.8rem;line-height:1.5";
    recDiv.innerHTML = '<span style="font-size:.7rem;color:#888;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Recomendación del agente</span>'+recomendacion;
    container.appendChild(recDiv);
  }
}

function formatEEFF(p) {
  if(!p) return "";
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const s = String(p).trim();
  if(s.length === 6) {
    const yr = s.substring(0,4);
    const mo = parseInt(s.substring(4,6)) - 1;
    return meses[mo] + " " + yr;
  }
  return p;
}
