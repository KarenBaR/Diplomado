<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistente CEM — Interbank NBC Empresas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: linear-gradient(135deg, #f4f6f9 0%, #e8eef6 100%); margin: 0; padding: 0; color: #222; }

    .container {
      max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column;
      background: #fff; box-shadow: 0 0 30px rgba(0,0,0,.1);
    }

    header {
      background: linear-gradient(135deg, #003366 0%, #0055a5 100%);
      color: #fff; padding: 20px 24px; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    header .status {
      font-size: .75rem; opacity: .8; margin-left: auto; padding: 4px 10px;
      background: rgba(255,255,255,.2); border-radius: 12px;
    }

    .chat-box {
      flex: 1; overflow-y: auto; padding: 20px 20px; display: flex;
      flex-direction: column; gap: 14px;
    }

    .message {
      display: flex; gap: 10px; animation: slideIn .3s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .message.bot { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }

    .bubble {
      max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: .9rem;
      line-height: 1.4; word-wrap: break-word;
    }

    .message.bot .bubble {
      background: #e8eef6; color: #003366; border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #0055a5; color: #fff; border-bottom-right-radius: 4px;
    }

    .chips-container {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
    }

    .chip {
      padding: 8px 14px; background: #cddcf0; color: #003366; border: none;
      border-radius: 20px; font-size: .85rem; font-weight: 500; cursor: pointer;
      transition: all .2s; border: 2px solid transparent;
    }
    .chip:hover { background: #b0c4e0; transform: translateY(-2px); }
    .chip:active { transform: scale(.96); }

    .input-area {
      padding: 16px 20px; border-top: 1px solid #e0e7ef; display: flex; gap: 10px;
      background: #f9fbff;
    }

    input[type=text], input[type=number] {
      flex: 1; padding: 10px 14px; border: 2px solid #ccd4df; border-radius: 24px;
      font-size: .9rem; outline: none; transition: border .2s;
    }
    input:focus { border-color: #0055a5; }

    button {
      padding: 10px 20px; background: #0055a5; color: #fff; border: none;
      border-radius: 24px; font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .1s;
    }
    button:hover { background: #003e80; }
    button:active { transform: scale(.96); }

    .typing {
      display: flex; gap: 4px; align-items: center; padding: 12px 16px;
      background: #e8eef6; border-radius: 18px; width: fit-content; border-bottom-left-radius: 4px;
    }
    .typing span {
      width: 8px; height: 8px; background: #0055a5; border-radius: 50%;
      animation: bounce .6s infinite;
    }
    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .result-box {
      background: #f0f5fc; border-left: 4px solid #0055a5; border-radius: 8px;
      padding: 12px 14px; font-size: .82rem; margin-top: 6px;
      max-height: 200px; overflow-y: auto;
    }

    .badge {
      display: inline-block; border-radius: 6px; padding: 3px 10px;
      font-size: .78rem; font-weight: 700; margin-left: 4px; background: #d4edda; color: #155724;
    }

    .error { color: #dc3545; }
    .success { color: #28a745; }

    .cem-resultado {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      border-radius: 12px; padding: 16px; margin-top: 10px;
      border-left: 4px solid #28a745;
    }
    .cem-resultado h3 { margin: 0 0 10px; color: #155724; }
    .cem-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .cem-item {
      background: rgba(255,255,255,.6); border-radius: 8px; padding: 10px; text-align: center;
    }
    .cem-item .val { font-size: 1.1rem; font-weight: 700; color: #003366; }
    .cem-item .lbl { font-size: .75rem; color: #555; margin-top: 4px; }

    @media (max-width: 640px) {
      .container { height: auto; min-height: 100vh; }
      header h1 { font-size: .95rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🏦 Asistente CEM</h1>
    <div class="status" id="api-status" onclick="cambiarURL()" style="cursor:pointer" title="Clic para cambiar URL">verificando...</div>
  </header>

  <div class="chat-box" id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviarRespuesta()"/>
    <button onclick="enviarRespuesta()">Enviar</button>
  </div>
</div>

<script>
  const API = localStorage.getItem("cem_api_url") || "https://helping-hometown-soa-semester.trycloudflare.com";
  let estado = { paso: "inicio", periodo_activo: null, periodos: [], ruc_actual: null };

  const chat = document.getElementById("chat-box");
  const input = document.getElementById("user-input");
  const statusEl = document.getElementById("api-status");

  function addBotMessage(text, chips = [], isTyping = false) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "message bot";
    if (isTyping) {
      msgDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = text.replace(/\n/g, "<br>");
      msgDiv.appendChild(bubble);
      if (chips.length > 0) {
        const chipsDiv = document.createElement("div");
        chipsDiv.className = "chips-container";
        chips.forEach(({ label, value }) => {
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.textContent = label;
          chip.onclick = () => { 
            input.value = value; 
            enviarRespuesta();
          };
          chipsDiv.appendChild(chip);
        });
        msgDiv.appendChild(chipsDiv);
      }
    }
    chat.appendChild(msgDiv);
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
    return msgDiv;
  }

  function addUserMessage(text) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "message user";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    msgDiv.appendChild(bubble);
    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    return addBotMessage("", [], true);
  }

  async function checkHealth() {
    try {
      const r = await fetch(API + "/api/v1/health");
      const d = await r.json();
      statusEl.textContent = "✅ API activa";
      return true;
    } catch (e) {
      statusEl.textContent = "❌ Sin conexión";
      return false;
    }
  }

  async function iniciar() {
    const ok = await checkHealth();
    if (!ok) {
      addBotMessage("⚠️ No puedo conectar con la API. Verifica la conexión e intenta de nuevo.");
      return;
    }

    try {
      const r = await fetch(API + "/api/v1/config/periodo");
      const d = await r.json();
      estado.periodos = d.periodos_disponibles || [];
      estado.periodo_activo = d.periodo_activo;
      
      addBotMessage(
        "¡Hola! 👋 Soy el Asistente CEM de Interbank NBC Empresas.\n\nVoy a ayudarte a calcular tu capacidad de endeudamiento mensual. Para empezar, ¿qué periodo de campaña deseas consultar?",
        estado.periodos.map(p => ({ label: p, value: p }))
      );
      estado.paso = "seleccionar_periodo";
    } catch (e) {
      addBotMessage("Error al cargar periodos disponibles. Intenta de nuevo.");
    }
  }

  async function enviarRespuesta() {
    const texto = input.value.trim();
    if (!texto) return;
    addUserMessage(texto);
    input.value = "";

    const typing = showTyping();

    if (estado.paso === "seleccionar_periodo") {
      await procesarPeriodo(texto, typing);
    } else if (estado.paso === "solicitar_ruc") {
      await procesarRuc(texto, typing);
    } else if (estado.paso === "solicitar_datos") {
      await procesarDatos(texto, typing);
    }
  }

  async function procesarPeriodo(periodo, typing) {
    if (!estado.periodos.includes(periodo)) {
      typing.remove();
      addBotMessage("No reconozco ese periodo. Elige uno de los disponibles:", 
        estado.periodos.map(p => ({ label: p, value: p })));
      return;
    }

    try {
      const r = await fetch(API + "/api/v1/config/periodo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ periodo })
      });
      const d = await r.json();
      typing.remove();

      if (!r.ok) {
        addBotMessage("❌ Error al activar el periodo: " + (d.detail || JSON.stringify(d)));
        return;
      }

      estado.periodo_activo = periodo;
      addBotMessage(`✅ Perfecto, periodo ${periodo} activado (${d.registros} registros en la base).\n\nAhora, ¿cuál es el RUC de la empresa que quieres consultar?`);
      estado.paso = "solicitar_ruc";
    } catch (e) {
      typing.remove();
      addBotMessage("❌ Error de conexión: " + e.message);
    }
  }

  async function procesarRuc(ruc, typing) {
    try {
      ruc = ruc.replace(/\D/g, "");
      if (ruc.length !== 11) {
        typing.remove();
        addBotMessage("El RUC debe tener 11 dígitos. Intenta de nuevo.");
        return;
      }

      const r = await fetch(API + "/api/v1/cem/buscar-ruc", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ruc })
      });
      const d = await r.json();
      typing.remove();

      if (!r.ok || !d.encontrado) {
        addBotMessage("❌ No encontré ese RUC en la base de datos. ¿Quieres intentar con otro?");
        return;
      }

      estado.ruc_actual = ruc;
      const fmt = (n) => n ? parseFloat(n).toLocaleString("es-PE", {minimumFractionDigits:0, maximumFractionDigits:0}) : "—";
      const fmtK = (n) => {
        if (!n || n == 0) return "—";
        if (n >= 1000000) return "S/ " + (n/1000000).toFixed(1) + "M";
        if (n >= 1000) return "S/ " + (n/1000).toFixed(0) + "K";
        return "S/ " + Math.round(n);
      };

      // Tarjeta del cliente con nuevos campos
      let cardHTML = `<div style="background:#e8eef6;border-radius:12px;padding:14px;margin-top:4px;border-left:4px solid #0055a5">`;
      cardHTML += `<div style="font-weight:700;font-size:1rem;color:#003366;margin-bottom:8px">🏢 ${d.razon_social || "Empresa"}</div>`;
      cardHTML += `<div style="font-size:.82rem;color:#444;line-height:1.8">`;
      cardHTML += `<b>Giro:</b> ${d.giro_canonico || "—"}<br>`;
      cardHTML += `<b>Sector:</b> ${d.subsector || "—"}<br>`;
      cardHTML += `<b>Margen:</b> ${d.margen_asignado ? (d.margen_asignado*100).toFixed(0)+"%" : "—"}<br>`;
      cardHTML += `<b>Deuda máx 12m:</b> ${fmtK(d.deuda_total_sbs)}<br>`;

      // Crédito actual
      if (d.situacion_cliente) {
        const sitColor = d.situacion_cliente === "CON_CREDITO" ? "#28a745" : "#e67e22";
        cardHTML += `<b>Situación:</b> <span style="color:${sitColor};font-weight:600">${d.situacion_cliente}</span><br>`;
      }
      if (d.estado_credito) cardHTML += `<b>Estado crédito:</b> ${d.estado_credito}<br>`;
      if (d.producto_credito) cardHTML += `<b>Producto:</b> ${d.producto_credito}<br>`;
      if (d.calificacion_cliente) {
        const califColor = d.calificacion_cliente.toUpperCase() === "NORMAL" ? "#28a745" : "#dc3545";
        cardHTML += `<b>Calificación:</b> <span style="color:${califColor};font-weight:600">${d.calificacion_cliente}</span><br>`;
      }
      if (d.total_creditos > 0) cardHTML += `<b>Créditos activos:</b> ${d.total_creditos}<br>`;
      if (d.meses_credito > 0) cardHTML += `<b>Meses del crédito:</b> ${d.meses_credito}<br>`;
      if (d.cuotas_por_pagar > 0) cardHTML += `<b>Cuotas por pagar:</b> ${d.cuotas_por_pagar}<br>`;

      // Cuotas
      cardHTML += `<hr style="border:none;border-top:1px solid #ccd4df;margin:6px 0">`;
      if (d.pago_mensual_financiero > 0) cardHTML += `<b>Cuota SF:</b> ${fmtK(d.pago_mensual_financiero)}<br>`;
      if (d.cuota_total_rrll > 0) cardHTML += `<b>Cuota RRLL:</b> ${fmtK(d.cuota_total_rrll)}<br>`;
      if (d.cuota_total_empresa > 0) cardHTML += `<b>Cuota empresa:</b> ${fmtK(d.cuota_total_empresa)}<br>`;
      if (d.saldo_vigente > 0) cardHTML += `<b>Saldo vigente:</b> ${fmtK(d.saldo_vigente)}<br>`;

      // Ventas SUNAT
      if (d.venta_anual_final > 0) {
        cardHTML += `<hr style="border:none;border-top:1px solid #ccd4df;margin:6px 0">`;
        cardHTML += `<b>Venta anual SUNAT:</b> ${fmtK(d.venta_anual_final)}`;
        if (d.periodo_eeff) cardHTML += ` <span style="color:#888;font-size:.78rem">(EEFF ${d.periodo_eeff})</span>`;
        cardHTML += `<br>`;
      }

      // Bancos principales
      if (d.banco_principal) {
        cardHTML += `<hr style="border:none;border-top:1px solid #ccd4df;margin:6px 0">`;
        cardHTML += `<b>Banco principal:</b> ${d.banco_principal} — ${fmtK(d.saldo_banco_principal)}<br>`;
        if (d.banco_2) cardHTML += `<b>Banco 2:</b> ${d.banco_2} — ${fmtK(d.saldo_banco_2)}<br>`;
      }

      // Potencial
      if (d.potencial) {
        cardHTML += `<hr style="border:none;border-top:1px solid #ccd4df;margin:6px 0">`;
        const potColor = d.potencial.grupo_tda === "P1" ? "#28a745" : d.potencial.grupo_tda === "P2" ? "#17a2b8" : "#e67e22";
        cardHTML += `<b>Potencial:</b> <span style="color:${potColor};font-weight:700">${d.potencial.grupo_tda || "—"}</span>`;
        if (d.potencial.score_propension) cardHTML += ` (score ${parseFloat(d.potencial.score_propension).toFixed(2)})`;
        cardHTML += `<br>`;
      }

      // Contexto del cliente
      if (d.contexto_cliente && d.contexto_cliente.texto_agente) {
        cardHTML += `<hr style="border:none;border-top:1px solid #ccd4df;margin:6px 0">`;
        cardHTML += `<span style="font-size:.8rem;color:#555;font-style:italic">🧠 ${d.contexto_cliente.texto_agente.replace(/\n/g,"<br>")}</span><br>`;
      }

      cardHTML += `</div></div>`;

      estado.ruc_actual = ruc;
      const msgDiv = document.createElement("div");
      msgDiv.className = "message bot";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `✅ Cliente encontrado:<br>${cardHTML}<br>Ahora necesito algunos datos para calcular el CEM.`;
      msgDiv.appendChild(bubble);
      chat.appendChild(msgDiv);
      setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
      estado.paso = "solicitar_datos";
      solicitarSiguienteDato();
    } catch (e) {
      typing.remove();
      addBotMessage("❌ Error al buscar RUC: " + e.message);
    }
  }

  let datos_calculo = {};

  function solicitarSiguienteDato() {
    const secuencia = [
      { key: "oferta_solicitada", label: "¿Cuánto de oferta necesitas? (S/)", placeholder: "50000" },
      { key: "plazo_meses", label: "¿A cuántos meses? (meses)", placeholder: "24" },
      { key: "venta_mensual_rp", label: "¿Cuál es tu venta mensual RT? (S/)", placeholder: "15000" },
      { key: "gastos_admin_mensual", label: "¿Cuáles son tus gastos administrativos al mes? (S/)", placeholder: "2500" }
    ];

    for (let d of secuencia) {
      if (!(d.key in datos_calculo)) {
        estado.dato_esperado = d.key;
        addBotMessage(d.label);
        return;
      }
    }

    // Todos los datos recolectados
    calcularCEM();
  }

  function procesarDatos(valor, typing) {
    typing.remove();
    const numVal = parseFloat(valor.replace(/[^\d.]/g, ""));
    if (isNaN(numVal) || numVal <= 0) {
      addBotMessage("Por favor, ingresa un número válido.");
      solicitarSiguienteDato();
      return;
    }

    datos_calculo[estado.dato_esperado] = numVal;
    addBotMessage("✓ Anotado.");
    solicitarSiguienteDato();
  }

  async function calcularCEM() {
    const typing = showTyping();
    try {
      const payload = {
        ruc: estado.ruc_actual,
        ...datos_calculo,
        tiene_programa_pagos: false
      };

      const r = await fetch(API + "/api/v1/cem/calcular", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const d = await r.json();
      typing.remove();

      if (!r.ok) {
        addBotMessage("❌ Error en el cálculo: " + d.detail);
        return;
      }

      const fmt = (n) => parseFloat(n).toLocaleString("es-PE", { minimumFractionDigits: 2 });
      const colorAlerta = d.alerta.includes("POSITIVO") ? "✅" : 
                         d.alerta.includes("NEGATIVO") ? "❌" : "⚠️";

      const resultMsg = document.createElement("div");
      resultMsg.className = "message bot";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `
        <strong>✨ Aquí está tu CEM calculado:</strong><br><br>
        <div class="cem-resultado">
          <h3>Resultado: ${colorAlerta} ${d.alerta}</h3>
          <div class="cem-grid">
            <div class="cem-item">
              <div class="val">S/ ${fmt(d.cem_mensual)}</div>
              <div class="lbl">CEM Mensual</div>
            </div>
            <div class="cem-item">
              <div class="val">S/ ${fmt(d.cuota_estimada_mensual)}</div>
              <div class="lbl">Cuota Estimada</div>
            </div>
          </div>
          <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,.1);">
            <strong>💡 Recomendación:</strong><br>
            ${d.recomendacion}
          </div>
        </div>
      `;
      resultMsg.appendChild(bubble);
      chat.appendChild(resultMsg);
      chat.scrollTop = chat.scrollHeight;

      // Reset para nueva consulta
      setTimeout(() => {
        addBotMessage("¿Deseas consultar otro RUC o cambiar de periodo?", [
          { label: "Otro RUC", value: "otro ruc" },
          { label: "Otro período", value: "otro periodo" }
        ]);
        estado.paso = "menu_final";
      }, 1000);

    } catch (e) {
      typing.remove();
      addBotMessage("❌ Error: " + e.message);
    }
  }

  function cambiarURL() {
    const nueva = prompt("Ingresa la nueva URL de la API:", localStorage.getItem("cem_api_url") || "");
    if (nueva && nueva.trim()) {
      localStorage.setItem("cem_api_url", nueva.trim().replace(/\/$/, ""));
      location.reload();
    }
  }

  // Iniciar
  window.addEventListener("load", iniciar);
</script>
</body>
</html>
