<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agente IA CEM — Interbank NBC Empresas</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:linear-gradient(135deg,#f0f4f8 0%,#e2eaf5 100%);margin:0;padding:0;color:#222;}
.container{max-width:640px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.12);}
header{background:linear-gradient(135deg,#1F4592 0%,#0055a5 100%);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:12px;}
header h1{margin:0;font-size:1.05rem;font-weight:600;flex:1;}
.status{font-size:.72rem;opacity:.9;padding:4px 12px;background:rgba(255,255,255,.18);border-radius:12px;cursor:pointer;white-space:nowrap;}
.chat-box{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;background:#f7f9fd;}
.message{display:flex;gap:8px;animation:fadeIn .25s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.message.bot{justify-content:flex-start;}
.message.user{justify-content:flex-end;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1F4592,#0055a5);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px;}
.bubble{max-width:88%;padding:11px 15px;border-radius:18px;font-size:.875rem;line-height:1.5;word-wrap:break-word;}
.message.bot .bubble{background:#fff;color:#1a1a2e;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:0.5px solid #e0e7f0;}
.message.user .bubble{background:linear-gradient(135deg,#1F4592,#0055a5);color:#fff;border-bottom-right-radius:4px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.chip{padding:6px 14px;background:#e8f0fb;color:#1F4592;border:1.5px solid #b8ccf0;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;}
.chip:hover{background:#1F4592;color:#fff;border-color:#1F4592;}
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px;background:#fff;border-radius:18px;border:0.5px solid #e0e7f0;width:fit-content;}
.typing span{width:7px;height:7px;background:#1F4592;border-radius:50%;animation:bounce .6s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.input-area{padding:14px 16px;border-top:1px solid #e8edf5;display:flex;gap:8px;background:#fff;}
input[type=text]{flex:1;padding:10px 16px;border:1.5px solid #d0daea;border-radius:24px;font-size:.875rem;outline:none;transition:border .2s;background:#f7f9fd;}
input[type=text]:focus{border-color:#1F4592;background:#fff;}
.send-btn{padding:10px 20px;background:linear-gradient(135deg,#1F4592,#0055a5);color:#fff;border:none;border-radius:24px;font-size:.875rem;font-weight:600;cursor:pointer;}
.send-btn:hover{opacity:.9;}

/* Tarjeta cliente */
.card-cliente{background:#fff;border-radius:14px;border:0.5px solid #d0daea;overflow:hidden;margin-top:6px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card-head{background:linear-gradient(135deg,#1F4592,#0055a5);padding:12px 16px;color:#fff;}
.card-head-nombre{font-weight:600;font-size:.95rem;margin-bottom:2px;}
.card-head-giro{font-size:.78rem;opacity:.85;}
.card-body{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;}
.card-field{display:flex;flex-direction:column;gap:1px;}
.card-label{font-size:.7rem;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.03em;}
.card-value{font-size:.85rem;color:#1a1a2e;font-weight:500;}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600;}
.badge-verde{background:#d4f4e2;color:#0a5c2e;}
.badge-rojo{background:#fde8e8;color:#9b1c1c;}
.badge-azul{background:#dbeafe;color:#1e40af;}
.badge-naranja{background:#fef3c7;color:#92400e;}
.badge-p1{background:#00BE50;color:#fff;}
.badge-p2{background:#1F4592;color:#fff;}
.badge-p3{background:#fd7e14;color:#fff;}
.badge-p4{background:#6c757d;color:#fff;}
.card-div{grid-column:1/-1;height:0.5px;background:#e8edf5;}

/* Tabla P&G */
.pyg-wrap{background:#fff;border-radius:14px;border:0.5px solid #d0daea;overflow:hidden;margin-top:6px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.pyg-head{background:linear-gradient(135deg,#1F4592,#0055a5);padding:11px 16px;color:#fff;font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:6px;}
.pyg-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.pyg-table td{padding:8px 14px;border-bottom:0.5px solid #f0f4f8;}
.pyg-table tr:last-child td{border-bottom:none;}
.pyg-table .col-n{width:36px;color:#888;font-size:.75rem;}
.pyg-table .col-v{text-align:right;font-weight:500;min-width:100px;}
.pyg-edit{cursor:pointer;}
.pyg-edit:hover .col-v-inner{background:#e8f0fb;border-radius:6px;padding:1px 6px;color:#1F4592;}
.row-result{background:#f0f4f8;}
.row-result td{font-weight:600;}
.row-cem{background:linear-gradient(135deg,#e8f8f0,#d4f4e2);}
.row-cem td{font-weight:700;color:#0a5c2e;font-size:.9rem;}
.row-cem-rojo{background:#fde8e8;}
.row-cem-rojo td{font-weight:700;color:#9b1c1c;font-size:.9rem;}
.pyg-footer{padding:11px 14px;display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:500;}
.pyg-footer.ok{background:#d4f4e2;color:#0a5c2e;}
.pyg-footer.warn{background:#fef3c7;color:#92400e;}
.pyg-footer.error{background:#fde8e8;color:#9b1c1c;}
.pyg-hint{font-size:.7rem;color:#aaa;padding:4px 14px 8px;font-style:italic;}
.inp-inline{width:90px;text-align:right;border:1.5px solid #1F4592;border-radius:6px;padding:2px 6px;font-size:.84rem;background:#f0f6ff;outline:none;}

/* Menu botones grandes */
.menu-btns{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.menu-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1.5px solid #d0daea;border-radius:12px;cursor:pointer;transition:all .15s;text-align:left;}
.menu-btn:hover{border-color:#1F4592;background:#e8f0fb;}
.menu-btn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.menu-btn-txt{font-weight:600;font-size:.88rem;color:#1a1a2e;}
.menu-btn-sub{font-size:.75rem;color:#888;margin-top:1px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div style="font-size:20px">🏦</div>
    <h1>Agente IA — Banca Negocio</h1>
    <div class="status" id="api-status" onclick="cambiarURL()" title="Clic para cambiar URL">verificando...</div>
  </header>
  <div class="chat-box" id="chat-box"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter')enviarRespuesta()"/>
    <button class="send-btn" onclick="enviarRespuesta()">Enviar</button>
  </div>
</div>

<script>
let API = localStorage.getItem("cem_api_url") || "";
let estado = { paso:"menu_principal", modo:"", periodo_activo:null, periodos:[], ruc_actual:null, ruc_data:null };
let datos_calculo = {};
let pyg_vals = {};

const chat = document.getElementById("chat-box");
const input = document.getElementById("user-input");
const statusEl = document.getElementById("api-status");

const FI_TABLA = [[7500,6.6],[10000,5.1],[15000,4.1],[20000,3.1],[25000,2.5],[30000,2.2],[40000,2.0],[50000,1.8],[60000,1.5],[80000,1.5],[100000,1.4],[200000,1.1],[Infinity,1.0]];
const calcFI = v => { for(const [t,fi] of FI_TABLA) if(v<=t) return fi; return 1.0; };
const getFiLabel = v => { const fi=calcFI(v); return fi+"x"; };
const fmtExacto = n => {
  if(!n && n!==0) return "—";
  n = parseFloat(n);
  if(isNaN(n)) return "—";
  return n.toLocaleString("es-PE",{minimumFractionDigits:2, maximumFractionDigits:2});
};

const fmtK = n => {
  if (!n && n!==0) return "—";
  n = parseFloat(n);
  if (isNaN(n)) return "—";
  if (Math.abs(n)>=1e6) return "S/ "+(n/1e6).toFixed(1)+"M";
  if (Math.abs(n)>=1e3) return "S/ "+(n/1e3).toFixed(0)+"K";
  return "S/ "+Math.round(n).toLocaleString("es-PE");
};
const fmt2 = n => n ? parseFloat(n).toLocaleString("es-PE",{minimumFractionDigits:2,maximumFractionDigits:2}) : "0.00";

function botMsg(html, chips=[]) {
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = html;
  if (chips.length) {
    const cd = document.createElement("div");
    cd.className = "chips";
    chips.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "chip";
      btn.textContent = c.label;
      btn.onclick = () => { input.value = c.value; enviarRespuesta(); };
      cd.appendChild(btn);
    });
    bub.appendChild(cd);
  }
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
  return bub;
}

function userMsg(txt) {
  const div = document.createElement("div");
  div.className = "message user";
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.textContent = txt;
  div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing() {
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function checkAPI() {
  try {
    const r = await fetch(API+"/api/v1/health",{signal:AbortSignal.timeout(4000)});
    if(r.ok){ statusEl.textContent="✅ API activa"; return true; }
  } catch(e){}
  statusEl.textContent="❌ Sin conexión";
  return false;
}

function cambiarURL() {
  const n = prompt("URL de la API:", API||"https://...");
  if(n&&n.trim()){ localStorage.setItem("cem_api_url",n.trim().replace(/\/$/,"")); location.reload(); }
}

async function iniciar() {
  if(!API){ botMsg("⚠️ Configura la URL de la API haciendo clic en el botón del header."); return; }
  const ok = await checkAPI();
  if(!ok){ botMsg("⚠️ No puedo conectar con la API. Verifica la URL."); return; }
  try {
    const r = await fetch(API+"/api/v1/config/periodo");
    const d = await r.json();
    estado.periodos = d.periodos_disponibles||[];
    estado.periodo_activo = d.periodo_activo || estado.periodos[0];
    // Pedir periodo UNA SOLA VEZ al inicio
    const chips = estado.periodos.map(p=>({label:p, value:p}));
    botMsg(`¡Hola! 👋 Bienvenido al <b>Agente IA de Banca Negocio</b>.<br>Antes de empezar, ¿con qué campaña vas a trabajar hoy?<br><span style="font-size:.75rem;color:#888">El periodo activo es <b>${estado.periodo_activo}</b> — puedes cambiarlo aquí</span>`,
      chips);
    estado.paso = "seleccionar_periodo_inicial";
  } catch(e){ botMsg("Error al cargar periodos. Intenta de nuevo."); }
}

function mostrarMenu() {
  const periodoLabel = estado.periodo_activo ? `<span style="font-size:.75rem;color:#888;display:block;margin-bottom:4px">Periodo: <b>${estado.periodo_activo}</b></span>` : "";
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `¡Hola! 👋 Soy el <b>Agente IA de Banca Negocio</b>.${periodoLabel}<br>¿Qué deseas hacer?
    <div class="menu-btns">
      <div class="menu-btn" onclick="seleccionarOpcion('cem')">
        <div class="menu-btn-icon" style="background:#e8f0fb">📋</div>
        <div><div class="menu-btn-txt">Calcular CEM</div><div class="menu-btn-sub">Capacidad de endeudamiento mensual</div></div>
      </div>
      <div class="menu-btn" onclick="seleccionarOpcion('perfil')">
        <div class="menu-btn-icon" style="background:#e8f8f0">👤</div>
        <div><div class="menu-btn-txt">Perfil del cliente</div><div class="menu-btn-sub">Ficha completa, riesgo y potencial</div></div>
      </div>
      <div class="menu-btn" onclick="seleccionarOpcion('vinculados')">
        <div class="menu-btn-icon" style="background:#fef9e7">👥</div>
        <div><div class="menu-btn-txt">Ver vinculados</div><div class="menu-btn-sub">RRLL, cónyuge y bancos</div></div>
      </div>
    </div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);
  estado.paso = "menu_principal";
}

function seleccionarOpcion(modo) {
  estado.modo = modo;
  if(modo==="vinculados") {
    botMsg("Ingresa el <b>RUC</b> del cliente:");
    estado.paso = "ruc_vinculados";
  } else {
    // Seleccionar periodo — por defecto el más reciente
    const chips = estado.periodos.map(p=>({label:p, value:p}));
    botMsg(`Selecciona el <b>periodo de campaña</b>:<br><span style="font-size:.75rem;color:#888">Por defecto: ${estado.periodo_activo}</span>`, chips);
    estado.paso = "seleccionar_periodo";
  }
}

async function enviarRespuesta() {
  const txt = input.value.trim();
  if(!txt) return;
  input.value = "";

  if(estado.paso==="menu_principal") return;

  userMsg(txt);
  const t = typing();

  if(estado.paso==="seleccionar_periodo_inicial" || estado.paso==="seleccionar_periodo") {
    t.remove();
    const periodo = estado.periodos.includes(txt) ? txt : estado.periodo_activo;
    try {
      const r = await fetch(API+"/api/v1/config/periodo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({periodo})});
      const d = await r.json();
      estado.periodo_activo = periodo;
      botMsg(`Perfecto, trabajaremos con la campaña <b>${periodo}</b> (${d.registros||""} clientes en base).<br>Ingresa el <b>RUC</b> del cliente que quieres revisar:`);
      estado.paso = "solicitar_ruc";
      estado.modo = "inicio";
    } catch(e){ botMsg("Hubo un problema al cambiar el periodo. ¿Lo intentamos de nuevo?"); }

  } else if(estado.paso==="solicitar_ruc") {
    await buscarRuc(txt.replace(/\D/g,""), t);

  } else if(estado.paso==="ruc_vinculados") {
    await buscarVinculados(txt.replace(/\D/g,""), t);

  } else if(estado.paso==="solicitar_datos" || estado.paso==="confirmar_gf") {
    t.remove();
    if(estado.paso==="confirmar_gf") return; // manejado por botones
    const num = parseFloat(txt.replace(/[^\d.]/g,""));
    if(isNaN(num) || num < 0){ botMsg("Ese valor no lo reconozco como número. Ingresa el monto en soles — si no aplica, pon 0."); pedirSiguienteDato(); return; }
    datos_calculo[estado.dato_esperado] = num;
    pedirSiguienteDato();

  } else if(estado.paso==="menu_post") {
    t.remove();
    if(txt==="__nuevo_ruc__"){ datos_calculo={}; botMsg(`Ingresa el <b>RUC</b> del cliente:<br><span style="font-size:.75rem;color:#888">Periodo: ${estado.periodo_activo}</span>`); estado.paso="solicitar_ruc"; }
    else if(txt==="__menu__"){ datos_calculo={}; mostrarMenu(); }
    else if(txt==="__cem__"){ estado.modo="cem"; datos_calculo={}; botMsg(`Ingresa el <b>RUC</b> del cliente para calcular el CEM:`); estado.paso="solicitar_ruc"; }
    else if(txt==="__perfil__"){ estado.modo="perfil"; datos_calculo={}; botMsg(`Ingresa el <b>RUC</b> del cliente para ver su perfil:`); estado.paso="solicitar_ruc"; }
    else if(txt==="__vinculados__"){ estado.modo="vinculados"; datos_calculo={}; botMsg(`Ingresa el <b>RUC</b> del cliente para consultar sus vinculados:`); estado.paso="ruc_vinculados"; }
    else if(txt==="__cem_mismo__"){ estado.modo="cem"; datos_calculo={}; pedirSiguienteDato(); }
    else if(txt==="__vinc_mismo__"){ const t2=typing(); buscarVinculados(estado.ruc_actual, t2); }
  }
}

async function buscarRuc(ruc, t) {
  if(ruc.length!==11){ t.remove(); botMsg("Ese RUC no parece correcto — debe tener exactamente 11 dígitos. ¿Lo intentamos de nuevo?"); return; }
  try {
    const r = await fetch(API+"/api/v1/cem/buscar-ruc",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ruc})});
    const d = await r.json();
    t.remove();
    if(!r.ok||!d.encontrado){ botMsg("No encontré ese RUC en la base de datos de esta campaña. Verifica que sea correcto o prueba con otro."); return; }
    estado.ruc_actual = ruc;
    estado.ruc_data = d;
    // Cuota SF de referencia = cuota_sf_total de la BD
    estado.cuota_sf_ref = (d.pago_mensual_financiero||0) + (d.cuota_total_rrll||0) + (d.cuota_total_empresa||0);
    mostrarTarjetaCliente(d, ruc);
  } catch(e){ t.remove(); botMsg("❌ Error: "+e.message); }
}

function mostrarTarjetaCliente(d, ruc) {
  const potGrupo = d.potencial?.grupo_tda || "";
  const potScore = d.potencial?.score_propension ? parseFloat(d.potencial.score_propension).toFixed(2) : "";
  const calif = (d.calificacion_cliente||"").toUpperCase();
  const califClass = calif==="NORMAL"?"badge-verde":"badge-rojo";
  const potClass = potGrupo==="P1"?"badge-p1":potGrupo==="P2"?"badge-p2":potGrupo==="P3"?"badge-p3":"badge-p4";
  const sitClass = d.situacion_cliente==="CON_CREDITO"?"badge-verde":"badge-naranja";

  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `<b>✅ Encontré al cliente</b>
    <div class="card-cliente">
      <div class="card-head">
        <div class="card-head-nombre">${d.razon_social||"—"}</div>
        <div class="card-head-giro">${d.giro_canonico||"—"}</div>
      </div>
      <div class="card-body">
        <div class="card-field"><span class="card-label">RUC</span><span class="card-value">${ruc}</span></div>
        <div class="card-field"><span class="card-label">Sector</span><span class="card-value">${d.subsector||"—"}</span></div>
        <div class="card-field"><span class="card-label">Margen asignado</span><span class="card-value">${d.margen_asignado?(d.margen_asignado*100).toFixed(0)+"%":"—"}</span></div>
        <div class="card-field"><span class="card-label">Deuda máx. 12m</span><span class="card-value">${fmtK(d.deuda_total_sbs)}</span></div>
        <div class="card-div"></div>
        ${calif?`<div class="card-field"><span class="card-label">Calificación</span><span class="card-value"><span class="badge ${califClass}">${d.calificacion_cliente}</span></span></div>`:""}
        ${d.situacion_cliente?`<div class="card-field"><span class="card-label">Situación</span><span class="card-value"><span class="badge ${sitClass}">${d.situacion_cliente}</span></span></div>`:""}
        ${d.saldo_vigente>0?`<div class="card-field"><span class="card-label">Saldo vigente</span><span class="card-value">${fmtK(d.saldo_vigente)}</span></div>`:""}
        ${d.pago_mensual_financiero>0?`<div class="card-field"><span class="card-label">Cuota SF</span><span class="card-value">${fmtK(d.pago_mensual_financiero)}</span></div>`:""}
        ${potGrupo?`<div class="card-field"><span class="card-label">Potencial</span><span class="card-value"><span class="badge ${potClass}">${potGrupo}</span>${potScore?" score "+potScore:""}</span></div>`:""}
        ${d.venta_anual_final>0?`<div class="card-div"></div><div class="card-field" style="grid-column:1/-1"><span class="card-label">Venta anual SUNAT${d.periodo_eeff?" (EEFF "+d.periodo_eeff+")":""}</span><span class="card-value">${fmtK(d.venta_anual_final)}</span></div>`:""}
      </div>
    </div>`;

  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);

  // Siempre mostrar los 3 botones después de la cartilla
  mostrarBotonesRuc(d);
}

function mostrarBotonesRuc(d) {
  const nombre = d.razon_social || "este cliente";
  // Crear/actualizar la barra de navegación fija del cliente
  actualizarNavCliente(d);
  // Mostrar mensaje con botones
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `¿Qué deseas hacer con <b>${nombre}</b>?
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
      <div class="menu-btn" onclick="accionRuc('cem')" style="flex-direction:column;align-items:center;text-align:center;padding:10px 8px">
        <div style="font-size:22px">📋</div>

    datos_calculo = {};
    pedirSiguienteDato();
  } else if(modo === "perfil") {
    mostrarPerfilCompleto(estado.ruc_data);

};

const SECUENCIA = [
  {key:"oferta_solicitada",   label:"¿Cuánto es la oferta que le vas a presentar al cliente?",     hint:"Ej: 50000 — en soles"},
  {key:"plazo_meses",         label:"¿A qué plazo? (en meses)",                                     hint:"Ej: 24, 36, 48 meses"},
  {key:"venta_mensual_rp",    label:"¿Cuál es la venta promedio mensual del negocio?",              hint:"El RT del cliente — en soles"},
  {key:"gastos_admin_mensual",label:"¿Cuánto gasta mensualmente en administración del negocio?",   hint:"Si no lo tienes claro, pon 0"},
  {key:"gastos_familiares_mensual",label:"¿Cuánto destina mensualmente para gastos del hogar?",    hint:"Alimentación, servicios, educación, etc."},
];

function pedirSiguienteDato() {
  for(let s of SECUENCIA) {
    if(!(s.key in datos_calculo)) {
      estado.dato_esperado = s.key;
      estado.paso = "solicitar_datos";

      // Ventas: mostrar FI de referencia
      if(s.key==="venta_mensual_rp" && estado.ruc_data?.venta_anual_sunat) {
        const vd = estado.ruc_data.venta_anual_sunat/12;
        const fi = calcFI(vd);
        const vaj = fmtExacto(vd * fi);
        const vdExacto = fmtExacto(vd);
        botMsg(`${s.label}<br>
          <div style="background:#f0f6ff;border-radius:8px;padding:8px 10px;margin-top:4px;font-size:.78rem;">
            <b>Referencia SUNAT:</b> S/ ${vdExacto}/mes declarada<br>
            <b>FI aplicado:</b> ${fi}x → venta ajustada <b style="color:#1F4592">S/ ${vaj}</b><br>
            <span style="color:#888">Ingresa la venta RT real del cliente</span>
          </div>`);
      }
      // Gasto financiero: confirmar con cuota SF de BD
      else if(s.key==="gastos_familiares_mensual" && estado.cuota_sf_ref > 0) {
        // Antes de gastos familiares, confirmar GF si aún no está confirmado
        if(!("gasto_financiero_mensual" in datos_calculo)) {
          confirmarGastoFinanciero(); return;
        }
        botMsg(`${s.label}<br><span style="font-size:.75rem;color:#aaa">${s.hint}</span>`);
      }
      else {
        botMsg(`${s.label}<br><span style="font-size:.75rem;color:#aaa">${s.hint}</span>`);
      }
      return;
    }
  }
  // Confirmar GF si no está definido aún
  if(!("gasto_financiero_mensual" in datos_calculo)) {
    confirmarGastoFinanciero(); return;
  }
  calcularCEM();
}

async function calcularCEM() {
  const t = typing();
  try {
    const payload = {
      ruc: estado.ruc_actual,
      oferta_solicitada: datos_calculo.oferta_solicitada,
      plazo_meses: datos_calculo.plazo_meses,
      venta_mensual_rp: datos_calculo.venta_mensual_rp,
      gastos_admin_mensual: datos_calculo.gastos_admin_mensual||0,
      tiene_programa_pagos: (datos_calculo.gasto_financiero_mensual||0) > 0,
      gasto_financiero_mensual: datos_calculo.gasto_financiero_mensual||0,
      gastos_familiares_mensual: datos_calculo.gastos_familiares_mensual||0,
    };
    const r = await fetch(API+"/api/v1/cem/calcular",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const d = await r.json();
    t.remove();
    if(!r.ok){ botMsg("Tuve un error al calcular el CEM: "+(d.detail||"error desconocido")+". ¿Revisamos los datos ingresados?"); return; }
    mostrarPyG(d);
  } catch(e){ t.remove(); botMsg("❌ Error: "+e.message); }
}

function mostrarPyG(d) {
  const det = d.detalle||{};
  pyg_vals = {
    ventas:   det.paso_01_ventas_rt       || datos_calculo.venta_mensual_rp || 0,
    margen:   (estado.ruc_data?.margen_asignado) || 0.45,
    g_admin:  det.paso_04_gastos_admin    || datos_calculo.gastos_admin_mensual || 0,
    g_fin:    det.paso_06_gastos_financieros || datos_calculo.gasto_financiero_mensual || 0,
    g_fam:    det.paso_08_gastos_familiares || datos_calculo.gastos_familiares_mensual || 0,
    cuota:    d.cuota_estimada_mensual    || 0,
    oferta:   datos_calculo.oferta_solicitada || 0,
    plazo:    datos_calculo.plazo_meses || 0,
  };

  const pygId = "pyg_"+Date.now();
  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `<b>📊 Aquí está el Estado de Pérdidas y Ganancias</b><div id="${pygId}"></div><div style="font-size:.75rem;color:#888;margin-top:4px">✏ Doble clic en cualquier fila para ajustar los valores y ver el impacto en el CEM.</div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 50);

  renderPyG(pygId);

  // Recomendación humanizada post-CEM
  const cemCalc = calcPyG(pyg_vals);
  const rucData = estado.ruc_data || {};
  const grp = rucData.grupo_propension_tda || rucData.potencial?.grupo_tda || "";
  let recomMsg = "";
  if(cemCalc.cem >= pyg_vals.cuota * 1.5) {
    recomMsg = grp==="P1"
      ? `Este es un cliente <b>P1 con margen sólido</b>. El CEM cubre ampliamente la cuota — considera si hay espacio para una oferta mayor.`
      : `El CEM cubre bien la cuota propuesta. El cliente tiene capacidad de pago holgada.`;
  } else if(cemCalc.cem >= pyg_vals.cuota) {
    recomMsg = `El cliente califica, pero el margen es <b>ajustado</b>. Valida bien los gastos financieros antes de enviar a Riesgos.`;
  } else if(cemCalc.cem > 0) {
    recomMsg = `El CEM es positivo pero <b>no cubre la cuota</b>. Puedes explorar bajar el monto o ampliar el plazo para reducir la cuota.`;
  } else {
    recomMsg = `El CEM resultó negativo. <b>Revisa los datos</b> — especialmente los gastos financieros y las ventas declaradas.`;
  }
  if(recomMsg) {
    setTimeout(()=>{ botMsg(`💡 <b>Recomendación:</b> ${recomMsg}`); }, 400);
  }
  setTimeout(()=>{
    mostrarMenuPost();
  }, recomMsg ? 900 : 600);
}

function calcPyG(v) {
  const ub  = v.ventas * v.margen;
  const uo  = ub - v.g_admin;
  const un  = uo - v.g_fin;
  const cem = un - v.g_fam;
  return { ub, uo, un, cem };
}

function renderPyG(pid) {
  const v = pyg_vals;
  const c = calcPyG(v);
  const ok = c.cem >= v.cuota;
  const footClass = ok ? "ok" : (c.cem > 0 ? "warn" : "error");
  const cemRowClass = c.cem >= 0 ? "row-cem" : "row-cem-rojo";

  const edCell = (campo, val, isPct) => {
    const display = isPct ? (val*100).toFixed(0)+"%" : "S/ "+fmt2(val);
    return `<td class="col-v pyg-edit" ondblclick="editPyG('${pid}','${campo}',this,${isPct})" title="Doble clic para editar">
      <span class="col-v-inner">${display} ✏</span></td>`;
  };
  const calcCell = v2 => `<td class="col-v">S/ ${fmt2(v2)}</td>`;

  document.getElementById(pid).innerHTML = `
    <div class="pyg-wrap">
      <div class="pyg-head">📊 Estado de Pérdidas y Ganancias <span style="font-size:.72rem;opacity:.7;margin-left:auto">doble clic para editar</span></div>
      <table class="pyg-table">
        <tr><td class="col-n">01</td><td>Ventas RT (+)</td>${edCell("ventas",v.ventas,false)}</tr>
        <tr><td class="col-n">02</td><td>Costo de ventas (−) <span style="font-size:.75rem;color:#aaa">margen ${(v.margen*100).toFixed(0)}%</span></td>${edCell("margen",v.margen,true)}</tr>
        <tr class="row-result"><td class="col-n">03</td><td>Utilidad bruta (=)</td>${calcCell(c.ub)}</tr>
        <tr><td class="col-n">04</td><td>Gastos administrativos (−)</td>${edCell("g_admin",v.g_admin,false)}</tr>
        <tr class="row-result"><td class="col-n">05</td><td>Utilidad operativa (=)</td>${calcCell(c.uo)}</tr>
        <tr><td class="col-n">06</td><td>Gastos financieros (−)</td>${edCell("g_fin",v.g_fin,false)}</tr>
        <tr class="row-result"><td class="col-n">07</td><td>Utilidad neta (=)</td>${calcCell(c.un)}</tr>
        <tr><td class="col-n">08</td><td>Gastos familiares (−)</td>${edCell("g_fam",v.g_fam,false)}</tr>
        <tr class="${cemRowClass}"><td class="col-n">09</td><td>CEM (=)</td>${calcCell(c.cem)}</tr>
      </table>
      <div class="pyg-hint">Oferta: S/ ${fmt2(v.oferta)} · ${v.plazo} meses · Cuota est.: S/ ${fmt2(v.cuota)}</div>
      <div class="pyg-footer ${footClass}">
        ${ok?"✅":"❌"} CEM S/ ${fmt2(c.cem)} ${ok?"≥":"<"} Cuota S/ ${fmt2(v.cuota)} · ${ok?"Califica":"No califica"}
      </div>
    </div>`;
}

window.editPyG = function(pid, campo, td, isPct) {
  const cur = isPct ? (pyg_vals[campo]*100).toFixed(1) : pyg_vals[campo].toFixed(0);
  const inp = document.createElement("input");
  inp.type="number"; inp.value=cur; inp.className="inp-inline";
  inp.step = isPct?"1":"100";
  td.innerHTML=""; td.appendChild(inp); inp.focus(); inp.select();
  const commit = () => {
    let v = parseFloat(inp.value);
    if(isNaN(v)) return;
    pyg_vals[campo] = isPct ? Math.max(1,Math.min(99,v))/100 : Math.max(0,v);
    renderPyG(pid);
  };
  inp.addEventListener("keydown", e => { if(e.key==="Enter"){e.preventDefault();commit();} if(e.key==="Escape")renderPyG(pid); });
  inp.addEventListener("blur", commit);
};

async function buscarVinculados(ruc, t) {
  if(!ruc || ruc.length!==11){ t.remove(); botMsg("El RUC debe tener 11 dígitos. ¿Lo volvemos a intentar?"); return; }

    const r = await fetch(API+"/api/v1/cem/vinculados/"+ruc);
    if(!r.ok){ t.remove(); botMsg("Tuve un problema al consultar los vinculados (error "+r.status+"). Intenta de nuevo en un momento."); return; }

    t.remove();
    // Verificar si tiene datos — algunos endpoints devuelven estructura diferente

            <div class="card-head-giro">${res.total_rrll||0} RRLL · ${res.rrll_con_mala_calif||0} con alerta</div>

function mostrarPerfilCompleto(d) {
  const grpTda = d.grupo_propension_tda || d.potencial?.grupo_tda || "";
  const grpTv  = d.grupo_propension_tv  || d.potencial?.grupo_tv  || "";
  const score  = d.score_propension ? parseFloat(d.score_propension).toFixed(3) : (d.potencial?.score_propension ? parseFloat(d.potencial.score_propension).toFixed(3) : "");
  const calif  = (d.calificacion_cliente||"").toUpperCase();
  const califClass = calif==="NORMAL"?"badge-verde":"badge-rojo";
  const potClass = grpTda==="P1"?"badge-p1":grpTda==="P2"?"badge-p2":grpTda==="P3"?"badge-p3":"badge-p4";
  const sitClass = d.situacion_cliente==="CON_CREDITO"?"badge-verde":"badge-naranja";

  // Señales del modelo
  const señales = [];
  if(d.flg_gestionado) señales.push({ico:"📞", txt:"Ya fue contactado por un ejecutivo", ok:true});
  else señales.push({ico:"📵", txt:"Nunca fue contactado — primera oportunidad", ok:false});
  if(d.flg_acepta1) señales.push({ico:"✅", txt:"Aceptó una oferta anterior — ya mostró interés", ok:true});
  if(d.flg_desembolsado) señales.push({ico:"💰", txt:"Ya tiene experiencia con IBK — cliente con historial", ok:true});
  if(d.max_atraso_ibk !== null && d.max_atraso_ibk >= 0) señales.push({ico:d.max_atraso_ibk===0?"✅":"⚠️", txt:d.max_atraso_ibk===0?"Al día en sus pagos con IBK":`Tiene atraso en IBK de ${d.max_atraso_ibk} días — revisar antes de avanzar`, ok:d.max_atraso_ibk===0});
  if(d.max_atraso_competencia > 0) señales.push({ico:"⚠️", txt:`Tiene atraso en la competencia (${d.max_atraso_competencia} días) — evaluar riesgo`, ok:false});
  if(d.meses_crecimiento_deuda > 6) señales.push({ico:"📈", txt:`Deuda en crecimiento continuo (${d.meses_crecimiento_deuda} de 12 meses) — negocio en expansión`, ok:true});
  if(d.cant_empresas_12m > 2) señales.push({ico:"🏦", txt:`Trabaja con ${d.cant_empresas_12m.toFixed(1)} entidades financieras en promedio — cliente multibanca activo`, ok:null});
  if(d.recencia_pensara_meses > 12) señales.push({ico:"🕐", txt:`Lleva ${d.recencia_pensara_meses} meses sin ser contactado — buen momento para retomar`, ok:null});

  const señalesHTML = señales.map(s=>`
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:0.5px solid #f0f4f8;font-size:.78rem">
      <span>${s.ico}</span>
      <span style="color:${s.ok===true?"#0a5c2e":s.ok===false?"#9b1c1c":"#555"}">${s.txt}</span>
    </div>`).join("");

  // Tendencia deuda
  const dvar12 = d.deuda_var_pct_12m;
  const dvar6  = d.deuda_var_pct_6m;
  const dvar3  = d.deuda_var_pct_3m;
  const tendColor = (v) => v > 0 ? "#0a5c2e" : v < 0 ? "#9b1c1c" : "#555";
  const tendSign = (v) => v > 0 ? "▲" : v < 0 ? "▼" : "=";

  const div = document.createElement("div");
  div.className = "message bot";
  div.innerHTML = '<div class="avatar">IA</div>';
  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = `<b>👤 Perfil completo</b>
    <div class="card-cliente">
      <div class="card-head">
        <div class="card-head-nombre">${d.razon_social||"—"}</div>
        <div class="card-head-giro">${d.giro_canonico||"—"} · ${d.subsector||""}</div>
      </div>
      <div class="card-body">
        <div class="card-field"><span class="card-label">RUC</span><span class="card-value">${estado.ruc_actual}</span></div>
        <div class="card-field"><span class="card-label">Margen</span><span class="card-value">${d.margen_asignado?(d.margen_asignado*100).toFixed(0)+"%":"—"}</span></div>
        <div class="card-field"><span class="card-label">Deuda máx. 12m</span><span class="card-value">${fmtK(d.deuda_total_sbs)}</span></div>
        <div class="card-field"><span class="card-label">Saldo vigente</span><span class="card-value">${d.saldo_vigente>0?fmtK(d.saldo_vigente):"Sin crédito vig."}</span></div>
        ${calif?`<div class="card-field"><span class="card-label">Calificación</span><span class="card-value"><span class="badge ${califClass}">${d.calificacion_cliente}</span></span></div>`:""}
        ${d.situacion_cliente?`<div class="card-field"><span class="card-label">Situación</span><span class="card-value"><span class="badge ${sitClass}">${d.situacion_cliente}</span></span></div>`:""}

        <div class="card-div"></div>

        ${grpTda?`
        <div class="card-field" style="grid-column:1/-1">
          <span class="card-label">Modelo de propensión</span>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px">
            <div style="text-align:center;background:#f7f9fd;border-radius:8px;padding:8px 4px">
              <div style="font-size:.7rem;color:#888">Grupo TDA</div>
              <span class="badge ${potClass}" style="font-size:.9rem;margin-top:2px;display:inline-block">${grpTda}</span>
            </div>
            <div style="text-align:center;background:#f7f9fd;border-radius:8px;padding:8px 4px">
              <div style="font-size:.7rem;color:#888">Grupo TV</div>
              <span class="badge ${grpTv==="P1"?"badge-p1":grpTv==="P2"?"badge-p2":"badge-p4"}" style="font-size:.9rem;margin-top:2px;display:inline-block">${grpTv||"—"}</span>
            </div>
            <div style="text-align:center;background:#f7f9fd;border-radius:8px;padding:8px 4px">
              <div style="font-size:.7rem;color:#888">Score</div>
              <div style="font-size:1rem;font-weight:600;color:#1F4592;margin-top:2px">${score||"—"}</div>
            </div>
          </div>
        </div>

        <div class="card-field" style="grid-column:1/-1;margin-top:4px">
          <span class="card-label" style="display:flex;align-items:center;gap:6px">
            Top 5 variables del modelo
            <span style="font-size:.7rem;color:#888;font-weight:400">— Feature Importance</span>
          </span>
          <div style="margin-top:6px;display:flex;flex-direction:column;gap:5px;font-size:.78rem" id="top5vars_${estado.ruc_actual}">
          </div>
        </div>
        `:""}

        ${dvar12!==null&&dvar12!==undefined?`
        <div class="card-field" style="grid-column:1/-1">
          <span class="card-label">Tendencia deuda</span>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;font-size:.78rem;text-align:center">
            <div style="background:#f7f9fd;border-radius:6px;padding:5px">
              <div style="color:#888;font-size:.7rem">3 meses</div>
              <div style="font-weight:600;color:${tendColor(dvar3)}">${tendSign(dvar3)} ${dvar3?.toFixed(1)||0}%</div>
            </div>
            <div style="background:#f7f9fd;border-radius:6px;padding:5px">
              <div style="color:#888;font-size:.7rem">6 meses</div>
              <div style="font-weight:600;color:${tendColor(dvar6)}">${tendSign(dvar6)} ${dvar6?.toFixed(1)||0}%</div>
            </div>
            <div style="background:#f7f9fd;border-radius:6px;padding:5px">
              <div style="color:#888;font-size:.7rem">12 meses</div>
              <div style="font-weight:600;color:${tendColor(dvar12)}">${tendSign(dvar12)} ${dvar12?.toFixed(1)||0}%</div>
            </div>
          </div>
        </div>
        `:""}

        <div class="card-div"></div>

        <div class="card-field" style="grid-column:1/-1">
          <span class="card-label">Señales del modelo</span>
          <div style="margin-top:4px">${señalesHTML}</div>
        </div>

        ${d.monto_oferta_max_ult3m>0?`
        <div class="card-div"></div>
        <div class="card-field"><span class="card-label">Oferta máx. ult. 3m</span><span class="card-value">${fmtK(d.monto_oferta_max_ult3m)}</span></div>
        <div class="card-field"><span class="card-label">Meses gestionado</span><span class="card-value">${d.meses_gestionados_ult3m||0} de 3</span></div>
        `:""}

        ${d.venta_anual_final>0?`
        <div class="card-div"></div>
        <div class="card-field" style="grid-column:1/-1">
          <span class="card-label">Venta anual SUNAT${d.periodo_eeff?" (EEFF "+d.periodo_eeff+")":""}</span>
          <span class="card-value">${fmtK(d.venta_anual_final)}</span>
        </div>`:""}
      </div>
    </div>`;
  div.appendChild(bub);
  chat.appendChild(div);
  setTimeout(function() {
    chat.scrollTop = chat.scrollHeight;
    renderTop5(d, estado.ruc_actual);
  }, 50);
  mostrarMenuPost(false);
}

function mostrarMenuPost(conCliente=false, ruc=null) {
    estado.paso = "menu_post";
    let chips = [
      {label:"📋 Calcular CEM", value:"__cem__"},
      {label:"👤 Perfil cliente", value:"__perfil__"},
      {label:"👥 Ver vinculados", value:"__vinculados__"},
    ];
    if(conCliente && ruc) {
      // Si venimos de perfil, ofrecer calcular CEM del mismo cliente
      botMsg(`¿Qué más necesitas sobre <b>${estado.ruc_data?.razon_social||ruc}</b>?`,[
        {label:"📋 Calcular CEM de este cliente", value:"__cem_mismo__"},
        {label:"👥 Ver vinculados de este cliente", value:"__vinc_mismo__"},
        {label:"🔁 Consultar otro RUC", value:"__nuevo_ruc__"},
      ]);
    } else {
      botMsg(`¿Algo más en lo que te pueda ayudar?`, chips.concat([
        {label:"🔁 Consultar otro RUC", value:"__nuevo_ruc__"},
      ]));
    }
  }

function renderTop5(d, ruc) {
  const container = document.getElementById("top5vars_"+ruc);
  if(!container) return;
  const vars = [
    {lbl:"Max. Deuda SF Ult. 12M",      pct:13.26, val:d.v1_deuda_max_12m,      tipo:"miles"},
    {lbl:"Var. Deuda No-IBK Ult. 12M",  pct:8.45,  val:d.v2_var_deuda_noibk_12m, tipo:"pct"},
    {lbl:"Prom. Saldo Vig. Prest. 6M",  pct:7.17,  val:d.v3_saldo_vig_prestamos, tipo:"miles"},
    {lbl:"Prom. Nro. Coloc. Bancos 12M",pct:5.99,  val:d.v4_nro_coloc_bancos,    tipo:"num"},
    {lbl:"Cant. Empresas Prom. Anno",   pct:5.33,  val:d.v5_cant_empresas,       tipo:"num"},
  ];
  vars.forEach(function(v) {
    const valFmt = (v.val===null||v.val===undefined) ? "—" :
      v.tipo==="miles" ? fmtK(v.val) :
      v.tipo==="pct"   ? (v.val>0?"▲ ":"▼ ")+Math.abs(v.val).toFixed(1)+"%" :
      parseFloat(v.val).toFixed(2);
    const barW = Math.min(100, v.pct * 6);
    const barC = v.pct>=10 ? "#1F4592" : v.pct>=7 ? "#0055a5" : "#5b86c2";
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:6px";
    row.innerHTML =
      '<div style="width:14px;height:14px;border-radius:3px;background:'+barC+';flex-shrink:0"></div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:2px">'+
          '<span style="color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%">'+v.lbl+'</span>'+
          '<span style="color:#1F4592;font-weight:600;flex-shrink:0">'+valFmt+'</span>'+
        '</div>'+
        '<div style="height:4px;background:#e8edf5;border-radius:2px">'+
          '<div style="height:4px;width:'+barW+'%;background:'+barC+';border-radius:2px"></div>'+
        '</div>'+
      '</div>'+
      '<span style="color:#888;font-size:.7rem;flex-shrink:0;min-width:30px;text-align:right">'+v.pct+'%</span>';
    container.appendChild(row);
  });
}

window.addEventListener("load", iniciar);
</script>
</body>
</html>
